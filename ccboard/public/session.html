<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccboard — session</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00aa2a;
      --green-faint: #004d15;
      --amber: #ffb000;
      --amber-dim: #aa7500;
      --amber-faint: #3d2a00;
      --red: #ff3333;
      --red-dim: #aa2222;
      --cyan: #00ffff;
      --cyan-dim: #008888;
      --cyan-faint: #002a2a;
      --bg: #0a0a0a;
      --bg-card: #0d0d0d;
      --bg-card-hover: #121212;
      --border: #1a1a1a;
      --text: #888;
      --text-bright: #ccc;
      --text-dim: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* Full-height layout */
    .screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px 12px 0;
    }

    /* Header bar */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid #161616;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .back {
      color: var(--green-dim);
      text-decoration: none;
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid #1a1a1a;
    }
    .back:hover { border-color: var(--green-faint); }

    .session-title { font-size: 14px; color: var(--text-bright); letter-spacing: 1px; }
    .session-slug { font-size: 10px; color: #2a2a2a; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .status-badge { padding: 2px 8px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .status-badge.waiting { color: var(--amber); border: 1px solid var(--amber-dim); }
    .status-badge.working { color: var(--cyan); border: 1px solid var(--cyan-dim); }
    .status-badge.idle { color: var(--text-dim); border: 1px solid #222; }

    .tty-badge { color: #333; font-size: 10px; }

    /* Context bar */
    .context-row {
      display: flex;
      gap: 1px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .ctx-stat {
      flex: 1;
      background: var(--bg-card);
      padding: 4px 8px;
      text-align: center;
    }
    .ctx-stat .v { font-size: 14px; color: var(--text-bright); }
    .ctx-stat .v.warn { color: var(--amber); }
    .ctx-stat .v.crit { color: var(--red); }
    .ctx-stat .l { font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 1px; }

    .token-bar { height: 2px; background: #111; margin-bottom: 8px; flex-shrink: 0; }
    .token-bar-fill { height: 100%; transition: width 0.3s; }
    .token-bar-fill.ok { background: var(--green-faint); }
    .token-bar-fill.warn { background: var(--amber-dim); }
    .token-bar-fill.crit { background: var(--red-dim); }

    /* Three-pane layout */
    .panes {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }

    .pane-left { width: 280px; flex-shrink: 0; }
    .pane-center { flex: 1; min-width: 200px; }
    .pane-right { width: 340px; flex-shrink: 0; }

    /* Drag handles between panes */
    .pane-resize {
      width: 4px;
      cursor: col-resize;
      background: #0a0a0a;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .pane-resize:hover, .pane-resize.active { background: var(--green-faint); }

    /* Vertical resize handle between graph and reviews */
    .pane-resize-v {
      height: 4px;
      cursor: row-resize;
      background: #0a0a0a;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .pane-resize-v:hover, .pane-resize-v.active { background: var(--green-faint); }

    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      background: var(--bg-card);
    }

    .pane-header {
      font-size: 9px;
      color: #333;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 10px;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pane-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 4px;
    }

    .pane-scroll::-webkit-scrollbar { width: 3px; }
    .pane-scroll::-webkit-scrollbar-track { background: transparent; }
    .pane-scroll::-webkit-scrollbar-thumb { background: #1a1a1a; }

    .pane-spacer { flex: 1; }

    .pane-split {
      display: flex;
      flex-direction: column;
    }

    .pane-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* === LEFT PANE: Supervisor === */

    .sup-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px;
      flex-shrink: 0;
    }

    .sup-btn {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sup-btn:hover { background: var(--green-faint); color: var(--green); }
    .sup-btn.stop { border-color: var(--red-dim); color: var(--red-dim); }
    .sup-btn.stop:hover { background: rgba(255,51,51,0.1); }

    .sup-indicator { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
    .sup-indicator.reviewing { color: var(--cyan-dim); }

    .sup-section-title {
      font-size: 8px; color: #2a2a2a; letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 6px 3px; margin-top: 4px;
    }

    .sup-summary-row {
      padding: 3px 6px;
      border-bottom: 1px solid #0a0a0a;
    }
    .sup-summary-label { font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
    .sup-summary-value { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

    .sup-review-item {
      display: flex;
      gap: 6px;
      padding: 5px 6px;
      cursor: pointer;
      align-items: baseline;
      background: #0a0a0a;
      margin-bottom: 1px;
      min-width: 0;
      overflow: hidden;
    }
    .sup-review-item:hover { background: var(--bg-card-hover); }

    .sup-review-icon { font-size: 11px; }
    .sup-review-icon.ok { color: var(--green-dim); }
    .sup-review-icon.warning { color: var(--amber); }
    .sup-review-icon.issue { color: var(--red); }

    .sup-review-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; min-width: 80px; }
    .sup-review-detail { font-size: 10px; color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sup-review-item.warning .sup-review-detail { color: var(--amber-dim); }
    .sup-review-item.issue .sup-review-detail { color: var(--red-dim); }

    .sup-tmux { font-size: 9px; color: #1a1a1a; padding: 2px 6px; cursor: pointer; }
    .sup-tmux:hover { color: var(--text-dim); }

    .sup-reviewed-at { font-size: 8px; color: #1a1a1a; }

    .sup-empty { text-align: center; padding: 30px 10px; color: var(--green-faint); font-size: 11px; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .cursor { display:inline-block; width:6px; height:12px; background:var(--green-faint); animation:blink 1s step-end infinite; vertical-align:middle; margin-left:2px; }

    /* === CENTER PANE: Actions === */

    .turn-group { margin-bottom: 2px; }

    .turn-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 6px;
      background: #0b0b0b;
      border-left: 2px solid var(--amber-faint);
      cursor: pointer;
    }
    .turn-header:hover { background: #0e0e0e; }

    .turn-arrow { font-size: 8px; color: var(--text-dim); width: 8px; }
    .turn-group.collapsed .turn-arrow { content: ''; }

    .turn-preview { font-size: 11px; color: var(--amber); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .turn-meta { font-size: 8px; color: #2a2a2a; white-space: nowrap; }

    .turn-body { padding-left: 8px; }
    .turn-group.collapsed .turn-body { display: none; }

    .action-item {
      padding: 4px 6px;
      border-left: 2px solid #1a1a1a;
      margin-bottom: 1px;
      background: var(--bg-card);
    }
    .action-item.tool_use { border-left-color: var(--cyan-faint); }
    .action-item.assistant_text { border-left-color: var(--green-faint); }

    .action-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 1px; }
    .action-type { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .action-item.tool_use .action-type { color: var(--cyan-dim); }
    .action-item.assistant_text .action-type { color: var(--green-dim); }
    .action-time { font-size: 8px; color: #2a2a2a; }

    .action-detail { font-size: 11px; color: var(--text); white-space: pre-wrap; word-break: break-all; max-height: 80px; overflow: hidden; position: relative; }
    .action-detail.collapsed::after { content:''; position:absolute; bottom:0; left:0; right:0; height:20px; background:linear-gradient(transparent,var(--bg-card)); }
    .action-file { font-size: 10px; color: var(--cyan-dim); }
    .action-cmd { font-size: 10px; color: var(--text); background: #080808; padding: 2px 4px; display: inline-block; }
    .action-desc { font-size: 9px; color: #333; }

    /* === RIGHT PANE: Messages === */

    .message {
      padding: 6px 8px;
      margin-bottom: 1px;
    }
    .message.human { border-left: 2px solid var(--amber-faint); background: #0b0b0b; }
    .message.assistant { border-left: 2px solid var(--green-faint); background: var(--bg-card); }

    .message-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 2px; }
    .message-role { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .message.human .message-role { color: var(--amber-dim); }
    .message.assistant .message-role { color: var(--green-dim); }
    .message-time { font-size: 8px; color: #2a2a2a; }

    /* Rich markdown rendering */
    .message-text {
      font-size: 12px;
      color: #c0c0c0;
      line-height: 1.5;
      font-family: 'Inter', -apple-system, sans-serif;
      word-break: break-word;
    }

    .message-text p { margin: 0 0 8px; }
    .message-text p:last-child { margin-bottom: 0; }

    .message-text h1, .message-text h2, .message-text h3 {
      font-family: 'Inter', sans-serif;
      color: var(--text-bright);
      margin: 12px 0 6px;
      font-weight: 600;
    }
    .message-text h1 { font-size: 15px; }
    .message-text h2 { font-size: 13px; }
    .message-text h3 { font-size: 12px; color: var(--text); }

    .message-text strong { color: var(--text-bright); font-weight: 600; }
    .message-text em { color: var(--text); font-style: italic; }

    .message-text a { color: var(--cyan-dim); text-decoration: none; }
    .message-text a:hover { text-decoration: underline; }

    .message-text ul, .message-text ol {
      margin: 4px 0 8px 16px;
      padding: 0;
    }
    .message-text li { margin-bottom: 2px; }

    /* Inline code */
    .message-text code {
      font-family: 'JetBrains Mono', 'Share Tech Mono', monospace;
      font-size: 11px;
      background: #1a1a2a;
      color: #e06c75;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid #222;
    }

    /* Code blocks */
    .message-text pre {
      margin: 6px 0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .message-text pre code {
      display: block;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.5;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #1a1a2a;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre;
    }

    .message-text pre code::-webkit-scrollbar { height: 4px; }
    .message-text pre code::-webkit-scrollbar-thumb { background: #222; }

    /* Code block language label */
    .code-block-wrapper {
      position: relative;
    }

    .code-lang {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 9px;
      color: #444;
      padding: 2px 8px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .code-copy {
      position: absolute;
      top: 0;
      right: 50px;
      font-size: 9px;
      color: #333;
      padding: 2px 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .code-copy:hover { color: var(--text); }

    /* Blockquotes */
    .message-text blockquote {
      border-left: 2px solid var(--green-faint);
      margin: 6px 0;
      padding: 2px 10px;
      color: var(--text-dim);
    }

    /* Tables */
    .message-text table {
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 11px;
      width: 100%;
    }
    .message-text th, .message-text td {
      border: 1px solid #1a1a1a;
      padding: 4px 8px;
      text-align: left;
    }
    .message-text th {
      background: #111;
      color: var(--text-bright);
      font-weight: 500;
    }

    /* HR */
    .message-text hr {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 8px 0;
    }

    /* Human messages stay simpler */
    .message.human .message-text {
      font-family: 'Inter', sans-serif;
      color: var(--text-bright);
    }

    .send-area { flex-shrink: 0; padding: 6px; border-top: 1px solid #111; }
    .send-bar { display: flex; gap: 4px; }

    .send-input {
      flex: 1;
      background: #080808;
      border: 1px solid #1a1a1a;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 11px;
      padding: 6px 8px;
      outline: none;
    }
    .send-input:focus { border-color: var(--green-faint); }
    .send-input::placeholder { color: #2a2a2a; }

    .send-btn {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 10px;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .send-btn:hover { background: var(--green-faint); color: var(--green); }

    .send-status { font-size: 9px; color: var(--green-dim); margin-top: 2px; min-height: 12px; }
    .send-status.error { color: var(--red-dim); }

    /* === Review Detail Modal === */

    .review-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 200; justify-content: center; align-items: center; padding: 20px;
    }
    .review-modal-overlay.open { display: flex; }

    .review-modal {
      background: var(--bg); border: 1px solid #222;
      width: 600px; max-width: 95vw; max-height: 80vh;
      display: flex; flex-direction: column;
    }

    .rm-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-bottom: 1px solid #161616; flex-shrink: 0;
    }
    .rm-title { display: flex; align-items: center; gap: 8px; }
    .rm-title span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-bright); }
    .rm-close { background: none; border: 1px solid #222; color: var(--text-dim); font-family: inherit; font-size: 10px; padding: 3px 8px; cursor: pointer; }
    .rm-close:hover { color: var(--text); }

    .rm-body { overflow-y: auto; padding: 14px; flex: 1; }
    .rm-body::-webkit-scrollbar { width: 3px; }
    .rm-body::-webkit-scrollbar-thumb { background: #1a1a1a; }

    .rm-section { margin-bottom: 14px; }
    .rm-section-title { font-size: 8px; color: #333; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 3px; }
    .rm-summary { font-size: 11px; color: var(--text); line-height: 1.4; }

    .rm-method-row { display: grid; grid-template-columns: 90px 1fr; gap: 6px; padding: 2px 0; font-size: 10px; }
    .rm-method-label { color: #333; text-transform: uppercase; letter-spacing: 1px; font-size: 8px; padding-top: 1px; }
    .rm-method-value { color: var(--text-dim); }
    .file-tag { display: inline-block; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 0 4px; margin: 1px; font-size: 9px; color: var(--cyan-dim); }

    .rm-finding { padding: 6px 8px; margin-bottom: 3px; border-left: 2px solid #222; background: #0a0a0a; }
    .rm-finding.high { border-left-color: var(--red-dim); }
    .rm-finding.medium { border-left-color: var(--amber-dim); }
    .rm-finding.low { border-left-color: var(--text-dim); }

    .rm-finding-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 3px; }
    .rm-finding-severity { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; padding: 1px 4px; border: 1px solid; }
    .rm-finding.high .rm-finding-severity { color: var(--red-dim); border-color: var(--red-dim); }
    .rm-finding.medium .rm-finding-severity { color: var(--amber-dim); border-color: var(--amber-dim); }
    .rm-finding.low .rm-finding-severity { color: var(--text-dim); border-color: #333; }
    .rm-finding-location { font-size: 9px; color: var(--cyan-dim); }
    .rm-finding-desc { font-size: 10px; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
    .rm-finding-suggestion { font-size: 9px; color: var(--green-dim); margin-bottom: 3px; }
    .rm-finding-evidence { font-size: 9px; color: var(--text-dim); background: #080808; padding: 3px 6px; white-space: pre-wrap; word-break: break-all; max-height: 60px; overflow-y: auto; border: 1px solid #111; }
    .rm-no-findings { color: var(--green-dim); font-size: 10px; padding: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="screen">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <a href="/" class="back">← BACK</a>
        <span class="session-title" id="session-title">loading...</span>
        <span class="session-slug" id="session-slug"></span>
      </div>
      <div class="header-right">
        <span class="status-badge" id="status-badge"></span>
        <span class="tty-badge" id="tty-badge"></span>
      </div>
    </div>

    <!-- Context stats -->
    <div class="context-row">
      <div class="ctx-stat"><div class="v" id="ctx-tokens">—</div><div class="l">tokens</div></div>
      <div class="ctx-stat"><div class="v" id="ctx-turns">—</div><div class="l">turns</div></div>
      <div class="ctx-stat"><div class="v" id="ctx-tools">—</div><div class="l">tools</div></div>
      <div class="ctx-stat"><div class="v" id="ctx-pct">—</div><div class="l">context</div></div>
    </div>
    <div class="token-bar"><div class="token-bar-fill ok" id="token-fill" style="width:0%"></div></div>

    <!-- Three panes with resize handles -->
    <div class="panes">
      <!-- LEFT: Supervisor Chat -->
      <div class="pane pane-left" id="pane-supervisor">
        <div class="pane-header">
          <span>Supervisor</span>
          <span id="sup-tmux-cmd" class="sup-tmux"></span>
          <span id="sup-status-text" class="sup-reviewed-at"></span>
        </div>
        <div class="pane-scroll" id="sup-chat-scroll">
          <div class="pane-spacer"></div>
          <div id="sup-chat-content">
            <div class="sup-empty">loading supervisor<span class="cursor"></span></div>
          </div>
        </div>
        <div class="send-area" id="sup-send-area">
          <div class="send-bar">
            <input type="text" class="send-input" id="sup-input" placeholder="Talk to supervisor..." />
            <button class="send-btn" id="sup-send-btn">SEND</button>
          </div>
          <div class="send-status" id="sup-send-status"></div>
        </div>
      </div>

      <div class="pane-resize" id="resize-left"></div>

      <!-- CENTER: Agent Trace (top) + Reviews (bottom) -->
      <div class="pane pane-center pane-split">
        <div class="pane-half" id="pane-graph-half">
          <div class="pane-header">
            <span>Agent Trace</span>
            <span class="sup-reviewed-at" id="graph-status"></span>
          </div>
          <div id="graph-container" style="flex:1;min-height:0;position:relative;background:#050505;"></div>
        </div>
        <div class="pane-resize-v" id="resize-center-v"></div>
        <div class="pane-half" id="pane-reviews-half">
          <div class="pane-header">
            <span>Reviews</span>
            <span class="sup-reviewed-at" id="review-timestamp"></span>
          </div>
          <div class="pane-scroll" id="reviews-scroll">
            <div id="reviews-content">
              <div class="sup-empty">no reviews yet</div>
            </div>
          </div>
        </div>
      </div>

      <div class="pane-resize" id="resize-right"></div>

      <!-- RIGHT: Agent Messages -->
      <div class="pane pane-right" id="pane-messages">
        <div class="pane-header">
          <span>Agent Chat</span>
          <span id="agent-tmux-cmd" class="sup-tmux"></span>
        </div>
        <div class="pane-scroll" id="messages-scroll">
          <div class="pane-spacer"></div>
          <div class="sup-empty">loading<span class="cursor"></span></div>
        </div>
        <div class="send-area" id="send-area"></div>
      </div>
    </div>
  </div>

  <!-- Review detail modal -->
  <div class="review-modal-overlay" id="review-modal">
    <div class="review-modal">
      <div class="rm-header">
        <div class="rm-title" id="rm-title"></div>
        <button class="rm-close" id="rm-close">ESC</button>
      </div>
      <div class="rm-body" id="rm-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="/file-graph.bundle.js"></script>
  <script>
    const pid = window.location.pathname.split('/').pop();
    const MAX_CONTEXT = 1000000;

    function escapeHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
    function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : ''; }
    function formatTokens(n) { return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n); }

    // Configure marked for markdown rendering
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true,
    });

    // Render markdown with code block wrappers
    function renderMarkdown(text) {
      if (!text) return '';
      let html = marked.parse(text);
      // Wrap pre>code blocks with language label and copy button
      html = html.replace(/<pre><code class="language-(\w+)">/g,
        '<div class="code-block-wrapper"><span class="code-lang">$1</span><pre><code class="language-$1">');
      html = html.replace(/<\/code><\/pre>/g, '</code></pre></div>');
      return html;
    }

    // --- Session info ---
    let currentSession = null;

    async function loadSessionInfo() {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();
      currentSession = sessions.find(s => s.pid === Number(pid));
      if (!currentSession) { document.getElementById('session-title').textContent = 'NOT FOUND'; return; }

      document.getElementById('session-title').textContent = currentSession.shortName;
      document.getElementById('session-slug').textContent = currentSession.slug || '';
      document.title = `ccboard — ${currentSession.shortName}`;

      const badge = document.getElementById('status-badge');
      badge.textContent = currentSession.status;
      badge.className = 'status-badge ' + currentSession.status;
      document.getElementById('tty-badge').textContent = currentSession.tty;

      // Show agent tmux command if managed
      const agentTmuxEl = document.getElementById('agent-tmux-cmd');
      if (currentSession.tmuxSession) {
        agentTmuxEl.textContent = 'tmux attach -t ' + currentSession.tmuxSession;
        agentTmuxEl.onclick = () => {
          navigator.clipboard.writeText('tmux attach -t ' + currentSession.tmuxSession);
          agentTmuxEl.textContent = 'copied!';
          setTimeout(() => { agentTmuxEl.textContent = 'tmux attach -t ' + currentSession.tmuxSession; }, 1500);
        };
      }
    }

    // --- Context ---
    async function loadContext() {
      const res = await fetch(`/api/sessions/${pid}/context`);
      const ctx = await res.json();
      const total = ctx.totalContextTokens || 0;
      const pct = total > 0 ? Math.round((total / MAX_CONTEXT) * 100) : 0;

      document.getElementById('ctx-tokens').textContent = formatTokens(total);
      document.getElementById('ctx-turns').textContent = ctx.totalTurns || 0;
      document.getElementById('ctx-tools').textContent = ctx.totalToolCalls || 0;

      const pctEl = document.getElementById('ctx-pct');
      pctEl.textContent = pct + '%';
      pctEl.className = 'v' + (pct > 80 ? ' crit' : pct > 50 ? ' warn' : '');

      const fill = document.getElementById('token-fill');
      fill.style.width = Math.min(pct, 100) + '%';
      fill.className = 'token-bar-fill ' + (pct > 80 ? 'crit' : pct > 50 ? 'warn' : 'ok');
    }

    // --- File Graph (center pane top) ---
    let fileGraph = null;
    let sigmaInstance = null;
    let lastActionCount = 0;

    async function loadGraph() {
      const container = document.getElementById('graph-container');
      const statusEl = document.getElementById('graph-status');
      if (!container) return;

      if (!fileGraph) {
        statusEl.textContent = 'indexing...';
        try {
          const filesRes = await fetch(`/api/sessions/${pid}/files`);
          const files = await filesRes.json();
          if (files.length === 0) { statusEl.textContent = 'no files'; return; }
          fileGraph = window.FileGraph.buildFileGraph(files);
          sigmaInstance = window.FileGraph.initSigma(container, fileGraph);
          statusEl.textContent = files.length + ' files';
          setTimeout(() => sigmaInstance.getCamera().animatedReset({ duration: 300 }), 500);
        } catch (e) {
          statusEl.textContent = 'error: ' + e.message;
          return;
        }
      }

      try {
        const actionsRes = await fetch(`/api/sessions/${pid}/actions`);
        const turns = await actionsRes.json();
        const allActions = [];
        for (const t of turns) allActions.push(...t.actions);
        window.FileGraph.applyActivity(fileGraph, allActions, currentSession?.cwd || '');
        lastActionCount = allActions.length;
        sigmaInstance?.refresh();
      } catch {}
    }

    function startGraphPolling() {
      setInterval(async () => {
        if (!fileGraph) return;
        try {
          const res = await fetch(`/api/sessions/${pid}/actions`);
          const turns = await res.json();
          const all = [];
          for (const t of turns) all.push(...t.actions);
          window.FileGraph.applyActivity(fileGraph, all, currentSession?.cwd || '');
          lastActionCount = all.length;
          sigmaInstance?.refresh();
        } catch {}
      }, 5000);
    }

    // --- Messages (right pane) ---
    async function loadMessages() {
      const res = await fetch(`/api/sessions/${pid}/messages`);
      const messages = await res.json();
      const scroll = document.getElementById('messages-scroll');

      if (messages.length === 0) {
        scroll.innerHTML = '<div class="pane-spacer"></div><div class="sup-empty">no messages</div>';
      } else {
        scroll.innerHTML = '<div class="pane-spacer"></div>' + messages.map(m => {
          return `<div class="message ${m.role}">
            <div class="message-head"><span class="message-role">${m.role==='human'?'YOU':'CLAUDE'}</span><span class="message-time">${formatTime(m.timestamp)}</span></div>
            <div class="message-text">${m.role === 'human' ? escapeHtml(m.text) : renderMarkdown(m.text)}</div>
          </div>`;
        }).join('');
      }
      scroll.scrollTop = scroll.scrollHeight;

      // Send area
      const s = currentSession;
      const canSend = s?.status === 'waiting' && s?.managed;
      let ph = 'Session not waiting';
      if (s?.status === 'waiting' && !s?.managed) ph = 'Launch via ccboard to send';
      if (canSend) ph = 'Type a message...';

      document.getElementById('send-area').innerHTML = `
        <div class="send-bar">
          <input type="text" class="send-input" id="send-input" placeholder="${ph}" ${canSend?'':'disabled'} />
          <button class="send-btn" id="send-btn" ${canSend?'':'disabled'}>SEND</button>
        </div>
        <div class="send-status" id="send-status"></div>`;

      const input = document.getElementById('send-input');
      const btn = document.getElementById('send-btn');
      const status = document.getElementById('send-status');

      async function send() {
        const text = input.value.trim();
        if (!text) return;
        btn.disabled = true;
        status.textContent = 'sending...';
        try {
          const r = await fetch(`/api/sessions/${pid}/send`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:text}) });
          const d = await r.json();
          if (d.ok) { status.textContent='sent'; input.value=''; input.focus(); setTimeout(()=>{loadGraph();loadMessages();},4000); }
          else { status.textContent=d.error; status.className='send-status error'; }
        } catch(e) { status.textContent=e.message; status.className='send-status error'; }
        btn.disabled = false;
      }
      btn?.addEventListener('click', send);
      input?.addEventListener('keydown', e => { if(e.key==='Enter') send(); });
    }

    // --- Supervisor Chat (left pane) ---
    const REVIEW_ICONS = { ok:'✓', warning:'⚠', issue:'✗' };
    const REVIEW_LABELS = { codeQuality:'CODE QUALITY', security:'SECURITY', scalability:'SCALABILITY', contextDrift:'CONTEXT DRIFT' };
    let currentReviewData = null;
    let supervisorActive = false;
    let supPollInterval = null;

    async function loadSupervisorChat() {
      const statusRes = await fetch(`/api/sessions/${pid}/supervisor`);
      const status = await statusRes.json();

      const statusText = document.getElementById('sup-status-text');
      const emptyState = document.getElementById('sup-empty-state');
      const sendArea = document.getElementById('sup-send-area');
      const chatContent = document.getElementById('sup-chat-content');

      if (!status.active) {
        // Auto-start supervisor if session is managed
        if (currentSession?.managed) {
          chatContent.innerHTML = `<div class="sup-empty">starting supervisor<span class="cursor"></span></div>`;
          statusText.textContent = 'starting...';
          await startSupervisor();
          return;
        }
        supervisorActive = false;
        chatContent.innerHTML = `<div class="sup-empty">supervisor requires a ccboard-managed session</div>`;
        statusText.textContent = '';
        if (supPollInterval) { clearInterval(supPollInterval); supPollInterval = null; }
        return;
      }

      supervisorActive = true;
      sendArea.style.display = '';
      statusText.textContent = status.isWaiting ? 'ready' : 'thinking...';

      // Show supervisor tmux command in header
      const supTmuxEl = document.getElementById('sup-tmux-cmd');
      if (status.tmuxSession) {
        supTmuxEl.textContent = 'tmux attach -t ' + status.tmuxSession;
        supTmuxEl.onclick = () => {
          navigator.clipboard.writeText('tmux attach -t ' + status.tmuxSession);
          supTmuxEl.textContent = 'copied!';
          setTimeout(() => { supTmuxEl.textContent = 'tmux attach -t ' + status.tmuxSession; }, 1500);
        };
      }

      // Load chat messages
      const msgRes = await fetch(`/api/sessions/${pid}/supervisor/messages`);
      const messages = await msgRes.json();

      const scroll = document.getElementById('sup-chat-scroll');

      if (messages.length === 0) {
        chatContent.innerHTML = `<div class="sup-empty">supervisor starting<span class="cursor"></span></div>`;
      } else {
        chatContent.innerHTML = messages.map(m => `
          <div class="message ${m.role}">
            <div class="message-head">
              <span class="message-role">${m.role==='human'?'YOU':'SUPERVISOR'}</span>
              <span class="message-time">${formatTime(m.timestamp)}</span>
            </div>
            <div class="message-text">${m.role === 'human' ? escapeHtml(m.text) : renderMarkdown(m.text)}</div>
          </div>
        `).join('');
      }

      scroll.scrollTop = scroll.scrollHeight;

      // Enable/disable input
      const input = document.getElementById('sup-input');
      const btn = document.getElementById('sup-send-btn');
      if (status.isWaiting) {
        input.disabled = false;
        btn.disabled = false;
        input.placeholder = 'Talk to supervisor...';
      } else {
        input.disabled = true;
        btn.disabled = true;
        input.placeholder = 'Supervisor is thinking...';
      }

      // SSE handles real-time updates now
    }

    async function startSupervisor() {
      await fetch(`/api/sessions/${pid}/supervisor/start`, {method:'POST'});
      setTimeout(loadSupervisorChat, 2000);
    }

    async function sendToSupervisor() {
      const input = document.getElementById('sup-input');
      const status = document.getElementById('sup-send-status');
      const text = input.value.trim();
      if (!text) return;

      input.disabled = true;
      status.textContent = 'sending...';
      try {
        const r = await fetch(`/api/sessions/${pid}/supervisor/send`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: text}),
        });
        const d = await r.json();
        if (d.ok) { input.value = ''; status.textContent = ''; setTimeout(loadSupervisorChat, 2000); }
        else { status.textContent = d.error; status.className = 'send-status error'; }
      } catch(e) { status.textContent = e.message; status.className = 'send-status error'; }
      input.disabled = false;
      input.focus();
    }

    document.getElementById('sup-send-btn').addEventListener('click', sendToSupervisor);
    document.getElementById('sup-input').addEventListener('keydown', e => { if(e.key==='Enter') sendToSupervisor(); });

    // --- Reviews (bottom of center pane) ---
    async function loadReviews() {
      try {
        const r = await fetch(`/api/sessions/${pid}/supervisor/reviews`);
        const data = await r.json();
        const container = document.getElementById('reviews-content');
        const timestamp = document.getElementById('review-timestamp');

        if (!data.combined && Object.keys(data.reviews||{}).length === 0) {
          container.innerHTML = '<div class="sup-empty">no reviews yet</div>';
          timestamp.textContent = '';
          return;
        }

        if (data.combined?.reviewedAt) {
          const t = typeof data.combined.reviewedAt === 'string' ? data.combined.reviewedAt : new Date(data.combined.reviewedAt).toISOString();
          timestamp.textContent = formatTime(t);
        }

        const review = data.combined?.review || data.reviews;
        if (!review) { container.innerHTML = '<div class="sup-empty">no reviews yet</div>'; return; }

        currentReviewData = review;
        let html = '';
        for (const [key, label] of Object.entries(REVIEW_LABELS)) {
          const item = review[key];
          if (!item) continue;
          const st = item.status || 'ok';
          const icon = REVIEW_ICONS[st] || '?';
          const sum = item.summary || (st==='ok'?'No issues':'See findings');
          const fc = (item.findings||[]).length;
          html += `<div class="sup-review-item ${st}" onclick="openReviewModal('${key}','${label}')">
            <span class="sup-review-icon ${st}">${icon}</span>
            <span class="sup-review-label">${label}</span>
            <span class="sup-review-detail">${escapeHtml(sum)}${fc?' ('+fc+')':''}</span>
          </div>`;
        }
        container.innerHTML = html || '<div class="sup-empty">no reviews yet</div>';
      } catch {
        document.getElementById('reviews-content').innerHTML = '<div class="sup-empty">no reviews yet</div>';
      }
    }

    // --- Review Modal ---
    function openReviewModal(key, label) {
      if (!currentReviewData) return;
      const item = currentReviewData[key];
      if (!item) return;
      const st = item.status||'ok';
      const icon = REVIEW_ICONS[st]||'?';
      const modal = document.getElementById('review-modal');
      document.getElementById('rm-title').innerHTML = `<span class="sup-review-icon ${st}" style="font-size:14px">${icon}</span><span>${label}</span>`;

      let html = `<div class="rm-section"><div class="rm-section-title">Summary</div><div class="rm-summary">${escapeHtml(item.summary||'No summary')}</div></div>`;

      if (item.methodology) {
        const m = item.methodology;
        html += `<div class="rm-section"><div class="rm-section-title">What was checked</div>`;
        if (m.criteria) html += `<div class="rm-method-row"><div class="rm-method-label">Criteria</div><div class="rm-method-value">${escapeHtml(m.criteria)}</div></div>`;
        if (m.baseline) html += `<div class="rm-method-row"><div class="rm-method-label">Compared to</div><div class="rm-method-value">${escapeHtml(m.baseline)}</div></div>`;
        if (m.filesChecked?.length) html += `<div class="rm-method-row"><div class="rm-method-label">Files</div><div class="rm-method-value">${m.filesChecked.map(f=>`<span class="file-tag">${escapeHtml(f)}</span>`).join('')}</div></div>`;
        html += `</div>`;
      }

      html += `<div class="rm-section"><div class="rm-section-title">Findings (${(item.findings||[]).length})</div>`;
      if (!item.findings?.length) {
        html += `<div class="rm-no-findings">No issues found</div>`;
      } else {
        for (const f of item.findings) {
          const sev = f.severity||'low';
          html += `<div class="rm-finding ${sev}">
            <div class="rm-finding-head"><span class="rm-finding-severity">${sev}</span>${f.location?`<span class="rm-finding-location">${escapeHtml(f.location)}</span>`:''}</div>
            <div class="rm-finding-desc">${escapeHtml(f.description||'')}</div>
            ${f.suggestion?`<div class="rm-finding-suggestion">→ ${escapeHtml(f.suggestion)}</div>`:''}
            ${f.evidence?`<div class="rm-finding-evidence">${escapeHtml(f.evidence)}</div>`:''}
          </div>`;
        }
      }
      html += `</div>`;

      document.getElementById('rm-body').innerHTML = html;
      modal.classList.add('open');
    }

    document.getElementById('rm-close').addEventListener('click', () => document.getElementById('review-modal').classList.remove('open'));
    document.getElementById('review-modal').addEventListener('click', e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('review-modal').classList.remove('open'); });

    // --- Real-time SSE streams ---

    function appendMessage(scrollId, role, text, timestamp, roleLabel) {
      const scroll = document.getElementById(scrollId);
      if (!scroll) return;
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = `
        <div class="message-head">
          <span class="message-role">${roleLabel || (role === 'human' ? 'YOU' : 'CLAUDE')}</span>
          <span class="message-time">${formatTime(timestamp)}</span>
        </div>
        <div class="message-text">${role === 'human' ? escapeHtml(text) : renderMarkdown(text)}</div>`;
      scroll.appendChild(div);
      scroll.scrollTop = scroll.scrollHeight;
    }

    function connectAgentStream() {
      const es = new EventSource(`/api/sessions/${pid}/stream`);
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'message') {
            appendMessage('messages-scroll', data.role, data.text, data.timestamp,
              data.role === 'human' ? 'YOU' : 'CLAUDE');
          }
        } catch {}
      };
      es.onerror = () => {
        es.close();
        // Reconnect after 3 seconds
        setTimeout(connectAgentStream, 3000);
      };
    }

    function connectSupervisorStream() {
      const es = new EventSource(`/api/sessions/${pid}/supervisor/stream`);
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'message') {
            // Remove the "loading" placeholder if present
            const content = document.getElementById('sup-chat-content');
            const empty = content?.querySelector('.sup-empty');
            if (empty) empty.remove();

            appendMessage('sup-chat-scroll', data.role, data.text, data.timestamp,
              data.role === 'human' ? 'YOU' : 'SUPERVISOR');
          }
          if (data.type === 'status') {
            const statusText = document.getElementById('sup-status-text');
            const input = document.getElementById('sup-input');
            const btn = document.getElementById('sup-send-btn');
            if (statusText) statusText.textContent = data.isWaiting ? 'ready' : 'thinking...';
            if (input) { input.disabled = !data.isWaiting; input.placeholder = data.isWaiting ? 'Talk to supervisor...' : 'Supervisor is thinking...'; }
            if (btn) btn.disabled = !data.isWaiting;
          }
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectSupervisorStream, 3000);
      };
    }

    // --- Init ---
    async function init() {
      await loadSessionInfo();
      await Promise.all([loadContext(), loadGraph(), loadMessages(), loadSupervisorChat(), loadReviews()]);
      startGraphPolling();
      setInterval(loadReviews, 15000);
      setInterval(loadContext, 10000);

      // Real-time agent chat via SSE
      connectAgentStream();
      // Real-time supervisor chat via SSE
      connectSupervisorStream();
    }
    init();

    // --- Resizable panes ---
    function setupResize(handleId, direction, beforeId, afterId) {
      const handle = document.getElementById(handleId);
      const before = document.getElementById(beforeId);
      const after = afterId ? document.getElementById(afterId) : null;
      if (!handle || !before) return;

      let startPos, startBefore, startAfter;

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handle.classList.add('active');
        document.body.style.cursor = direction === 'col' ? 'col-resize' : 'row-resize';
        document.body.style.userSelect = 'none';

        if (direction === 'col') {
          startPos = e.clientX;
          startBefore = before.offsetWidth;
          if (after) startAfter = after.offsetWidth;
        } else {
          startPos = e.clientY;
          startBefore = before.offsetHeight;
          if (after) startAfter = after.offsetHeight;
        }

        function onMove(e) {
          const delta = direction === 'col' ? e.clientX - startPos : e.clientY - startPos;
          const newBefore = Math.max(150, startBefore + delta);
          if (direction === 'col') {
            before.style.width = newBefore + 'px';
            if (after) after.style.width = Math.max(150, startAfter - delta) + 'px';
          } else {
            before.style.flex = 'none';
            before.style.height = newBefore + 'px';
            if (after) { after.style.flex = '1'; }
          }
          // Refresh sigma if graph container changed
          if (sigmaInstance) sigmaInstance.refresh();
        }

        function onUp() {
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (sigmaInstance) sigmaInstance.refresh();
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    setupResize('resize-left', 'col', 'pane-supervisor', null);
    setupResize('resize-right', 'col', 'pane-messages', null);
    setupResize('resize-center-v', 'row', 'pane-graph-half', 'pane-reviews-half');

    // For right resize, drag left = shrink right pane
    (function() {
      const handle = document.getElementById('resize-right');
      const pane = document.getElementById('pane-messages');
      if (!handle || !pane) return;
      // Override: drag right handle affects the right pane inversely
      handle.removeEventListener && handle.replaceWith(handle.cloneNode(true));
      const h = document.getElementById('resize-right');
      let startX, startW;
      h.addEventListener('mousedown', (e) => {
        e.preventDefault();
        h.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        startX = e.clientX;
        startW = pane.offsetWidth;
        function onMove(e) {
          pane.style.width = Math.max(150, startW - (e.clientX - startX)) + 'px';
          if (sigmaInstance) sigmaInstance.refresh();
        }
        function onUp() {
          h.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (sigmaInstance) sigmaInstance.refresh();
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    })();
  </script>
</body>
</html>
