            // Remove live output when a complete message arrives
            const live = document.getElementById('agent-live-output');
            if (live) live.remove();
            appendMessage('messages-scroll', data.role, data.text, data.timestamp,
              data.role === 'human' ? 'YOU' : 'CLAUDE');
          }
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectAgentStream, 3000);
      };
    }

    // Live pane stream — shows what the agent is currently outputting
    function connectPaneStream() {
      if (!currentSession?.managed) return;
      const es = new EventSource(`/api/sessions/${pid}/pane-stream`);
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type !== 'pane') return;

          const scroll = document.getElementById('messages-scroll');
          let live = document.getElementById('agent-live-output');

          if (data.status === 'waiting') {
            if (live) live.remove();
            return;
          }

          // Interactive prompt (plan mode, permissions, etc.)
          if (data.status === 'interactive' && data.interactivePrompt) {
            if (!live) {
              live = document.createElement('div');
              live.id = 'agent-live-output';
              live.style.cssText = 'border-left:2px solid var(--amber-faint);padding:8px 10px;margin-bottom:1px;background:var(--bg-card);';
              scroll.appendChild(live);
            }
            let promptHtml = '';
            if (data.interactivePrompt.context) {
              promptHtml += `<div style="font-size:11px;color:var(--text-bright);margin-bottom:8px;line-height:1.4;">${escapeHtml(data.interactivePrompt.context)}</div>`;
            }
            promptHtml += '<div style="display:flex;flex-direction:column;gap:4px;">';
            for (const opt of data.interactivePrompt.options) {
              if (opt.isTextInput) {
                promptHtml += `<div style="display:flex;gap:4px;">
                  <input type="text" id="interactive-text-input" class="send-input" style="flex:1;font-size:11px;padding:6px 8px;" placeholder="${escapeHtml(opt.text)}" />
                  <button class="send-btn" style="font-size:9px;padding:4px 10px;" onclick="sendInteractiveChoice(document.getElementById('interactive-text-input').value)">SEND</button>
                </div>`;
              } else {
                promptHtml += `<button class="send-btn" style="text-align:left;padding:6px 10px;font-size:11px;width:100%;border-color:var(--border);color:var(--text-bright);"
                  onmouseover="this.style.background='var(--bg-card-hover)'" onmouseout="this.style.background=''"
                  onclick="sendInteractiveChoice('${opt.number}')">
                  <span style="color:var(--amber);margin-right:6px;">${opt.number}.</span>${escapeHtml(opt.text)}
                </button>`;
              }
            }
            promptHtml += '</div>';
            live.innerHTML = promptHtml;
            scroll.scrollTop = scroll.scrollHeight;
            return;
          }

          // Agent is working — show live output
          if (!live) {
            live = document.createElement('div');
            live.id = 'agent-live-output';
            live.style.cssText = 'border-left:2px solid var(--cyan-faint);padding:6px 8px;margin-bottom:1px;background:var(--bg-card);';
            scroll.appendChild(live);
          }

          let html = '';

          if (data.spinnerVerb) {
            html += `<div style="font-size:10px;color:var(--cyan-dim);margin-bottom:4px;display:flex;align-items:center;gap:6px;">
              <span class="cursor"></span>
              <span>${escapeHtml(data.spinnerVerb)}</span>
            </div>`;
          }

          if (data.workingText) {
            html += `<div style="font-size:11px;color:var(--text);font-family:'Inter',sans-serif;white-space:pre-wrap;word-break:break-word;line-height:1.4;max-height:300px;overflow-y:auto;">${escapeHtml(data.workingText)}</div>`;
          }

          if (!html) {
            html = `<div style="font-size:10px;color:var(--cyan-dim);display:flex;align-items:center;gap:6px;">
              <span class="cursor"></span>
              <span>working...</span>
            </div>`;
          }

          live.innerHTML = html;
          scroll.scrollTop = scroll.scrollHeight;
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectPaneStream, 3000);
      };
    }

    function connectSupervisorStream() {
      const es = new EventSource(`/api/sessions/${pid}/supervisor/stream`);
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'message') {
            // Remove the "loading" placeholder if present
            const content = document.getElementById('sup-chat-content');
            const empty = content?.querySelector('.sup-empty');
            if (empty) empty.remove();

            appendMessage('sup-chat-scroll', data.role, data.text, data.timestamp,
              data.role === 'human' ? 'YOU' : 'SUPERVISOR');
          }
          if (data.type === 'status') {
            const statusText = document.getElementById('sup-status-text');
            const input = document.getElementById('sup-input');
            const btn = document.getElementById('sup-send-btn');
            if (statusText) statusText.textContent = data.isWaiting ? 'ready' : 'thinking...';
            if (input) { input.disabled = !data.isWaiting; input.placeholder = data.isWaiting ? 'Talk to supervisor...' : 'Supervisor is thinking...'; }
            if (btn) btn.disabled = !data.isWaiting;
          }
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectSupervisorStream, 3000);
      };
    }

    // --- Init ---
    async function init() {
      // Load session info first (fast — small JSON)
      await loadSessionInfo();

      // Start real-time streams immediately (they work while history loads)
      connectAgentStream();
      connectSupervisorStream();
      connectActionStream();
      connectPaneStream();

      // Load heavy data in parallel (messages, actions, reviews)
      // Don't await — let the page be interactive while these load
      Promise.all([
        loadContext(),
        loadMessages(),
        loadHistoricalActions(),
        loadSupervisorChat(),
        loadReviews(),
      ]);

      setInterval(loadReviews, 15000);
      setInterval(loadContext, 10000);

      // Slash commands
      setupSlashMenu('sup-input', 'sup-slash-menu', SUP_COMMANDS, sendToSupervisor);
      setupSlashMenu('send-input', 'agent-slash-menu', AGENT_COMMANDS, sendToAgent);
    }
    init().catch(err => console.error('[init] CRASHED:', err));

    // --- Resizable panes ---
    function setupResize(handleId, direction, beforeId, afterId) {
      const handle = document.getElementById(handleId);
      const before = document.getElementById(beforeId);
      const after = afterId ? document.getElementById(afterId) : null;
      if (!handle || !before) return;

      let startPos, startBefore, startAfter;

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handle.classList.add('active');
        document.body.style.cursor = direction === 'col' ? 'col-resize' : 'row-resize';
        document.body.style.userSelect = 'none';

        if (direction === 'col') {
          startPos = e.clientX;
          startBefore = before.offsetWidth;
          if (after) startAfter = after.offsetWidth;
        } else {
          startPos = e.clientY;
          startBefore = before.offsetHeight;
          if (after) startAfter = after.offsetHeight;
        }

        function onMove(e) {
          const delta = direction === 'col' ? e.clientX - startPos : e.clientY - startPos;
          const newBefore = Math.max(150, startBefore + delta);
          if (direction === 'col') {
            before.style.width = newBefore + 'px';
            if (after) after.style.width = Math.max(150, startAfter - delta) + 'px';
          } else {
            before.style.flex = 'none';
            before.style.height = newBefore + 'px';
            if (after) { after.style.flex = '1'; }
          }
          // Refresh sigma if graph container changed
          if (sigmaInstance) sigmaInstance.refresh();
        }

        function onUp() {
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (sigmaInstance) sigmaInstance.refresh();
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    setupResize('resize-left', 'col', 'pane-supervisor', null);
    setupResize('resize-right', 'col', 'pane-messages', null);
    setupResize('resize-center-v', 'row', 'pane-actions-half', 'pane-reviews-half');

    // For right resize, drag left = shrink right pane
    (function() {
      const handle = document.getElementById('resize-right');
      const pane = document.getElementById('pane-messages');
      if (!handle || !pane) return;
      // Override: drag right handle affects the right pane inversely
      handle.removeEventListener && handle.replaceWith(handle.cloneNode(true));
      const h = document.getElementById('resize-right');
      let startX, startW;
      h.addEventListener('mousedown', (e) => {
        e.preventDefault();
        h.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        startX = e.clientX;
        startW = pane.offsetWidth;
        function onMove(e) {
          pane.style.width = Math.max(150, startW - (e.clientX - startX)) + 'px';
          if (sigmaInstance) sigmaInstance.refresh();
        }
        function onUp() {
          h.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (sigmaInstance) sigmaInstance.refresh();
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    })();
  </script>
  <script src="/ccboard-shell.js"></script>
