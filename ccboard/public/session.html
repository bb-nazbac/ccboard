<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccboard — session</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css" />
  <link rel="stylesheet" href="/ccboard-shell.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00aa2a;
      --green-faint: #004d15;
      --amber: #ffb000;
      --amber-dim: #aa7500;
      --amber-faint: #3d2a00;
      --red: #ff3333;
      --red-dim: #aa2222;
      --cyan: #00ffff;
      --cyan-dim: #008888;
      --cyan-faint: #002a2a;
      --bg: #0a0a0a;
      --bg-card: #0d0d0d;
      --bg-card-hover: #121212;
      --border: #1a1a1a;
      --text: #888;
      --text-bright: #ccc;
      --text-dim: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* Full-height layout */
    .screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px 12px 0;
    }

    /* Header bar */
    /* Session switcher bar */
    .session-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid #161616;
      margin-bottom: 6px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .session-bar::-webkit-scrollbar { height: 0; }

    .back {
      color: var(--green-dim);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back:hover { border-color: var(--green-faint); }

    .session-tabs {
      display: flex;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .session-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-size: 10px;
      text-decoration: none;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.1s;
      min-width: 0;
    }

    .session-tab:hover {
      background: var(--bg-card);
      color: var(--text);
    }

    .session-tab.active {
      background: var(--bg-card);
      border-color: var(--border);
      color: var(--text-bright);
    }

    .session-tab.waiting { border-left: 2px solid var(--amber); }
    .session-tab.working { border-left: 2px solid var(--cyan); }
    .session-tab.idle { border-left: 2px solid #1a1a1a; }

    .session-tab .st-name { font-weight: 500; }
    .session-tab .st-status { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; }
    .session-tab.waiting .st-status { color: var(--amber-dim); }
    .session-tab.working .st-status { color: var(--cyan-dim); }
    .session-tab .st-shortcut {
      font-size: 8px;
      color: #2a2a2a;
      border: 1px solid #1a1a1a;
      padding: 0 3px;
      margin-left: 2px;
    }

    .session-title { font-size: 14px; color: var(--text-bright); letter-spacing: 1px; }
    .session-slug { font-size: 10px; color: #2a2a2a; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .status-badge { padding: 2px 8px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .status-badge.waiting { color: var(--amber); border: 1px solid var(--amber-dim); }
    .status-badge.working { color: var(--cyan); border: 1px solid var(--cyan-dim); }
    .status-badge.idle { color: var(--text-dim); border: 1px solid #222; }

    .tty-badge { color: #333; font-size: 10px; }

    /* Context bar */
    .context-row {
      display: flex;
      gap: 1px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .ctx-stat {
      flex: 1;
      background: var(--bg-card);
      padding: 4px 8px;
      text-align: center;
    }
    .ctx-stat .v { font-size: 14px; color: var(--text-bright); }
    .ctx-stat .v.warn { color: var(--amber); }
    .ctx-stat .v.crit { color: var(--red); }
    .ctx-stat .l { font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 1px; }

    .token-bar { height: 2px; background: #111; margin-bottom: 8px; flex-shrink: 0; }
    .token-bar-fill { height: 100%; transition: width 0.3s; }
    .token-bar-fill.ok { background: var(--green-faint); }
    .token-bar-fill.warn { background: var(--amber-dim); }
    .token-bar-fill.crit { background: var(--red-dim); }

    /* Three-pane layout */
    .panes {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }

    .pane-left { width: 280px; flex-shrink: 0; }
    .pane-center { flex: 1; min-width: 200px; }
    .pane-right { width: 340px; flex-shrink: 0; }

    /* Drag handles between panes */
    .pane-resize {
      width: 4px;
      cursor: col-resize;
      background: #0a0a0a;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .pane-resize:hover, .pane-resize.active { background: var(--green-faint); }

    /* Vertical resize handle between graph and reviews */
    .pane-resize-v {
      height: 4px;
      cursor: row-resize;
      background: #0a0a0a;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .pane-resize-v:hover, .pane-resize-v.active { background: var(--green-faint); }

    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      background: var(--bg-card);
    }

    .pane-header {
      font-size: 9px;
      color: #333;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 10px;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pane-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      padding: 4px;
    }

    .pane-scroll::-webkit-scrollbar { width: 3px; }
    .pane-scroll::-webkit-scrollbar-track { background: transparent; }
    .pane-scroll::-webkit-scrollbar-thumb { background: #1a1a1a; }

    .pane-spacer { flex: 1; }

    .pane-split {
      display: flex;
      flex-direction: column;
    }

    .pane-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* === LEFT PANE: Supervisor === */

    .sup-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px;
      flex-shrink: 0;
    }

    .sup-btn {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sup-btn:hover { background: var(--green-faint); color: var(--green); }
    .sup-btn.stop { border-color: var(--red-dim); color: var(--red-dim); }
    .sup-btn.stop:hover { background: rgba(255,51,51,0.1); }

    .sup-indicator { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
    .sup-indicator.reviewing { color: var(--cyan-dim); }

    .sup-section-title {
      font-size: 8px; color: #2a2a2a; letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 6px 3px; margin-top: 4px;
    }

    .sup-summary-row {
      padding: 3px 6px;
      border-bottom: 1px solid #0a0a0a;
    }
    .sup-summary-label { font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
    .sup-summary-value { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

    .sup-review-item {
      display: flex;
      gap: 6px;
      padding: 5px 6px;
      cursor: pointer;
      align-items: baseline;
      background: #0a0a0a;
      margin-bottom: 1px;
      min-width: 0;
      overflow: hidden;
    }
    .sup-review-item:hover { background: var(--bg-card-hover); }

    .sup-review-item.verdict-row {
      background: #0a0f1a;
      border-left: 3px solid #4488cc;
      margin-bottom: 4px;
      padding: 7px 8px;
    }
    .sup-review-item.verdict-row .sup-review-label { color: #6699cc; font-weight: 500; min-width: 110px; }
    .sup-review-item.verdict-row .sup-review-detail { color: var(--text); }
    .sup-review-item.verdict-row .sup-review-icon { color: #6699cc; }

    .sup-review-icon { font-size: 11px; }
    .sup-review-icon.ok { color: var(--green-dim); }
    .sup-review-icon.warning { color: var(--amber); }
    .sup-review-icon.issue { color: var(--red); }

    .sup-review-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; min-width: 80px; }
    .sup-review-detail { font-size: 10px; color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sup-review-item.warning .sup-review-detail { color: var(--amber-dim); }
    .sup-review-item.issue .sup-review-detail { color: var(--red-dim); }

    .sup-tmux { font-size: 9px; color: #1a1a1a; padding: 2px 6px; cursor: pointer; }
    .sup-tmux:hover { color: var(--text-dim); }

    .sup-reviewed-at { font-size: 8px; color: #1a1a1a; }

    .sup-empty { text-align: center; padding: 30px 10px; color: var(--green-faint); font-size: 11px; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .cursor { display:inline-block; width:6px; height:12px; background:var(--green-faint); animation:blink 1s step-end infinite; vertical-align:middle; margin-left:2px; }

    /* === CENTER PANE: Actions === */

    .turn-group { margin-bottom: 2px; }

    .turn-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 6px;
      background: #0b0b0b;
      border-left: 2px solid var(--amber-faint);
      cursor: pointer;
    }
    .turn-header:hover { background: #0e0e0e; }

    .turn-arrow { font-size: 8px; color: var(--text-dim); width: 8px; }
    .turn-group.collapsed .turn-arrow { content: ''; }

    .turn-preview { font-size: 11px; color: var(--amber); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .turn-meta { font-size: 8px; color: #2a2a2a; white-space: nowrap; }

    .turn-body { padding-left: 8px; }
    .turn-group.collapsed .turn-body { display: none; }

    .action-item {
      padding: 4px 6px;
      border-left: 2px solid #1a1a1a;
      margin-bottom: 1px;
      background: var(--bg-card);
    }
    .action-item.tool_use { border-left-color: var(--cyan-faint); }
    .action-item.assistant_text { border-left-color: var(--green-faint); }

    .action-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 1px; }
    .action-type { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .action-item.tool_use .action-type { color: var(--cyan-dim); }
    .action-item.assistant_text .action-type { color: var(--green-dim); }
    .action-time { font-size: 8px; color: #2a2a2a; }

    .action-detail { font-size: 11px; color: var(--text); white-space: pre-wrap; word-break: break-all; max-height: 80px; overflow: hidden; position: relative; }
    .action-detail.collapsed::after { content:''; position:absolute; bottom:0; left:0; right:0; height:20px; background:linear-gradient(transparent,var(--bg-card)); }
    .action-file { font-size: 10px; color: var(--cyan-dim); }
    .action-cmd { font-size: 10px; color: var(--text); background: #080808; padding: 2px 4px; display: inline-block; }
    .action-desc { font-size: 9px; color: #333; }

    /* === CENTER: Live Actions stream === */
    .action-event {
      padding: 3px 8px;
      margin-bottom: 1px;
      display: flex;
      gap: 6px;
      align-items: baseline;
      font-size: 11px;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .action-event .ae-time { font-size: 8px; color: var(--text-dim); min-width: 55px; }
    .action-event .ae-tool {
      font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
      min-width: 45px; font-weight: 500;
    }
    .action-event .ae-detail {
      color: var(--text); flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .action-event.tool-read .ae-tool { color: var(--cyan-dim); }
    .action-event.tool-edit .ae-tool { color: var(--amber-dim); }
    .action-event.tool-write .ae-tool { color: #8844aa; }
    .action-event.tool-bash .ae-tool { color: var(--text); }
    .action-event.tool-grep .ae-tool { color: var(--green-dim); }
    .action-event.tool-glob .ae-tool { color: var(--green-dim); }
    .action-event.tool-agent .ae-tool { color: #cc66dd; }
    .action-event.tool-think .ae-tool { color: var(--text-dim); }
    .action-event.tool-think .ae-detail { color: var(--text-dim); font-style: italic; }
    .action-event.tool-status .ae-tool { color: var(--text-dim); }
    .action-event.tool-status .ae-detail { color: var(--text-dim); }
    .action-event.tool-human { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 5px; }
    .action-event.tool-human .ae-tool { color: var(--amber-dim); }
    .action-event.tool-human .ae-detail { color: var(--amber); }
    .action-event.tool-result .ae-tool { color: var(--green-dim); }
    .action-event.tool-result .ae-detail { color: var(--text-dim); }

    .action-event.tool-edit .ae-detail,
    .action-event.tool-write .ae-detail { color: var(--amber); }
    .action-event.tool-read .ae-detail { color: var(--cyan); }


    /* === RIGHT PANE: Messages === */

    .message {
      padding: 6px 8px;
      margin-bottom: 1px;
    }
    .message.human { border-left: 2px solid var(--amber-faint); background: #0b0b0b; }
    .message.assistant { border-left: 2px solid var(--green-faint); background: var(--bg-card); }

    .message-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 2px; }
    .message-role { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .message.human .message-role { color: var(--amber-dim); }
    .message.assistant .message-role { color: var(--green-dim); }
    .message-time { font-size: 8px; color: #2a2a2a; }

    /* Rich markdown rendering */
    .message-text {
      font-size: 12px;
      color: #c0c0c0;
      line-height: 1.5;
      font-family: 'Inter', -apple-system, sans-serif;
      word-break: break-word;
      overflow-x: hidden;
      max-width: 100%;
    }

    .message-text p { margin: 0 0 8px; }
    .message-text p:last-child { margin-bottom: 0; }

    .message-text h1, .message-text h2, .message-text h3 {
      font-family: 'Inter', sans-serif;
      color: var(--text-bright);
      margin: 12px 0 6px;
      font-weight: 600;
    }
    .message-text h1 { font-size: 15px; }
    .message-text h2 { font-size: 13px; }
    .message-text h3 { font-size: 12px; color: var(--text); }

    .message-text strong { color: var(--text-bright); font-weight: 600; }
    .message-text em { color: var(--text); font-style: italic; }

    .message-text a { color: var(--cyan-dim); text-decoration: none; }
    .message-text a:hover { text-decoration: underline; }

    .message-text ul, .message-text ol {
      margin: 4px 0 8px 16px;
      padding: 0;
    }
    .message-text li { margin-bottom: 2px; }

    /* Inline code */
    .message-text code {
      font-family: 'JetBrains Mono', 'Share Tech Mono', monospace;
      font-size: 11px;
      background: #1a1a2a;
      color: #e06c75;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid #222;
    }

    /* Code blocks */
    .message-text pre {
      margin: 6px 0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      max-width: 100%;
    }

    .message-text pre code {
      display: block;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.5;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #1a1a2a;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre;
    }

    .message-text pre code::-webkit-scrollbar { height: 4px; }
    .message-text pre code::-webkit-scrollbar-thumb { background: #222; }

    /* Code block language label */
    .code-block-wrapper {
      position: relative;
    }

    .code-lang {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 9px;
      color: #444;
      padding: 2px 8px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .code-copy {
      position: absolute;
      top: 0;
      right: 50px;
      font-size: 9px;
      color: #333;
      padding: 2px 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .code-copy:hover { color: var(--text); }

    /* Blockquotes */
    .message-text blockquote {
      border-left: 2px solid var(--green-faint);
      margin: 6px 0;
      padding: 2px 10px;
      color: var(--text-dim);
    }

    /* Tables */
    .message-text table {
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 11px;
      width: 100%;
    }
    .message-text th, .message-text td {
      border: 1px solid #1a1a1a;
      padding: 4px 8px;
      text-align: left;
    }
    .message-text th {
      background: #111;
      color: var(--text-bright);
      font-weight: 500;
    }

    /* HR */
    .message-text hr {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 8px 0;
    }

    /* Human messages stay simpler */
    .message.human .message-text {
      font-family: 'Inter', sans-serif;
      color: var(--text-bright);
    }

    .send-area { flex-shrink: 0; padding: 6px; border-top: 1px solid #111; }
    .send-bar { display: flex; gap: 4px; }

    .send-input {
      flex: 1;
      background: #080808;
      border: 1px solid #1a1a1a;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 11px;
      padding: 6px 8px;
      outline: none;
    }
    .send-input:focus { border-color: var(--green-faint); }
    .send-input::placeholder { color: #2a2a2a; }

    .send-btn {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 10px;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .send-btn:hover { background: var(--green-faint); color: var(--green); }

    .send-status { font-size: 9px; color: var(--green-dim); margin-top: 2px; min-height: 12px; }
    .send-status.error { color: var(--red-dim); }

    /* Slash command autocomplete */
    .slash-menu {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom: none;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      z-index: 50;
    }

    .slash-menu.open { display: block; }

    .slash-item {
      padding: 6px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      cursor: pointer;
      font-size: 11px;
    }

    .slash-item:hover, .slash-item.selected {
      background: var(--bg-card-hover);
    }

    .slash-cmd { color: var(--green); font-family: 'Share Tech Mono', monospace; }
    .slash-desc { color: var(--text-dim); font-size: 9px; }

    /* Send area — relative for slash menu positioning */
    .send-area { position: relative; }

    /* Status bar at bottom of pane */
    .pane-status-bar {
      flex-shrink: 0;
      padding: 3px 10px;
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #111;
      background: var(--bg);
    }

    .pane-status-bar .shortcut {
      color: var(--text-dim);
      border: 1px solid #1a1a1a;
      padding: 0 3px;
      font-size: 7px;
      margin-right: 2px;
    }

    /* Tool call indicator */
    .tool-indicator {
      font-size: 9px;
      color: var(--cyan-dim);
      padding: 3px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .tool-indicator .cursor { width: 4px; height: 9px; }

    /* === Review Detail Modal === */

    .review-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 200; justify-content: center; align-items: center; padding: 20px;
    }
    .review-modal-overlay.open { display: flex; }

    .review-modal {
      background: var(--bg); border: 1px solid #222;
      width: 600px; max-width: 95vw; max-height: 80vh;
      display: flex; flex-direction: column;
    }

    .rm-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-bottom: 1px solid #161616; flex-shrink: 0;
    }
    .rm-title { display: flex; align-items: center; gap: 8px; }
    .rm-title span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-bright); }
    .rm-close { background: none; border: 1px solid #222; color: var(--text-dim); font-family: inherit; font-size: 10px; padding: 3px 8px; cursor: pointer; }
    .rm-close:hover { color: var(--text); }

    .rm-body { overflow-y: auto; padding: 14px; flex: 1; }
    .rm-body::-webkit-scrollbar { width: 3px; }
    .rm-body::-webkit-scrollbar-thumb { background: #1a1a1a; }

    .rm-section { margin-bottom: 14px; }
    .rm-section-title { font-size: 8px; color: #333; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 3px; }
    .rm-summary { font-size: 11px; color: var(--text); line-height: 1.4; }

    .rm-method-row { display: grid; grid-template-columns: 90px 1fr; gap: 6px; padding: 2px 0; font-size: 10px; }
    .rm-method-label { color: #333; text-transform: uppercase; letter-spacing: 1px; font-size: 8px; padding-top: 1px; }
    .rm-method-value { color: var(--text-dim); }
    .file-tag { display: inline-block; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 0 4px; margin: 1px; font-size: 9px; color: var(--cyan-dim); }

    .rm-finding { padding: 6px 8px; margin-bottom: 3px; border-left: 2px solid #222; background: #0a0a0a; }
    .rm-finding.high { border-left-color: var(--red-dim); }
    .rm-finding.medium { border-left-color: var(--amber-dim); }
    .rm-finding.low { border-left-color: var(--text-dim); }

    .rm-finding-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 3px; }
    .rm-finding-severity { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; padding: 1px 4px; border: 1px solid; }
    .rm-finding.high .rm-finding-severity { color: var(--red-dim); border-color: var(--red-dim); }
    .rm-finding.medium .rm-finding-severity { color: var(--amber-dim); border-color: var(--amber-dim); }
    .rm-finding.low .rm-finding-severity { color: var(--text-dim); border-color: #333; }
    .rm-finding-location { font-size: 9px; color: var(--cyan-dim); }
    .rm-finding-desc { font-size: 10px; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
    .rm-finding-suggestion { font-size: 9px; color: var(--green-dim); margin-bottom: 3px; }
    .rm-finding-evidence { font-size: 9px; color: var(--text-dim); background: #080808; padding: 3px 6px; white-space: pre-wrap; word-break: break-all; max-height: 60px; overflow-y: auto; border: 1px solid #111; }
    .rm-no-findings { color: var(--green-dim); font-size: 10px; padding: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="screen">
    <!-- Session switcher bar -->
    <div class="session-bar" id="session-bar">
      <a href="/" class="back">←</a>
      <div class="session-tabs" id="session-tabs"></div>
    </div>

    <!-- Context stats -->
    <div class="context-row">
      <div class="ctx-stat"><div class="v" id="ctx-tokens">—</div><div class="l">tokens</div></div>
      <div class="ctx-stat"><div class="v" id="ctx-turns">—</div><div class="l">turns</div></div>
      <div class="ctx-stat"><div class="v" id="ctx-tools">—</div><div class="l">tools</div></div>
      <div class="ctx-stat"><div class="v" id="ctx-pct">—</div><div class="l">context</div></div>
    </div>
    <div class="token-bar"><div class="token-bar-fill ok" id="token-fill" style="width:0%"></div></div>

    <!-- Three panes with resize handles -->
    <div class="panes">
      <!-- LEFT: Supervisor Chat -->
      <div class="pane pane-left" id="pane-supervisor">
        <div class="pane-header">
          <span>Supervisor</span>
          <span id="sup-tmux-cmd" class="sup-tmux"></span>
          <span id="sup-status-text" class="sup-reviewed-at"></span>
        </div>
        <div class="pane-scroll" id="sup-chat-scroll">
          <div class="pane-spacer"></div>
          <div id="sup-chat-content">
            <div class="sup-empty">loading supervisor<span class="cursor"></span></div>
          </div>
        </div>
        <div id="sup-tool-indicator" class="tool-indicator" style="display:none"></div>
        <div class="send-area" id="sup-send-area">
          <div class="slash-menu" id="sup-slash-menu"></div>
          <div class="send-bar">
            <input type="text" class="send-input" id="sup-input" placeholder="/ for commands, or type a message..." />
            <button class="send-btn" id="sup-send-btn">SEND</button>
          </div>
          <div class="send-status" id="sup-send-status"></div>
        </div>
      </div>

      <div class="pane-resize" id="resize-left"></div>

      <!-- CENTER: Live Actions (top) + Reviews (bottom) -->
      <div class="pane pane-center pane-split">
        <div class="pane-half" id="pane-actions-half">
          <div class="pane-header">
            <span>Live Actions</span>
            <span class="sup-reviewed-at" id="actions-status"></span>
          </div>
          <div class="pane-scroll" id="actions-stream" style="font-size:11px;flex:1;min-height:0;">
            <div class="pane-spacer"></div>
            <div class="sup-empty">waiting for agent activity<span class="cursor"></span></div>
          </div>
        </div>
        <div class="pane-resize-v" id="resize-center-v"></div>
        <div class="pane-half" id="pane-reviews-half">
          <div class="pane-header">
            <span>Reviews</span>
            <span class="sup-reviewed-at" id="review-timestamp"></span>
          </div>
          <div class="pane-scroll" id="reviews-scroll">
            <div id="reviews-content">
              <div class="sup-empty">no reviews yet</div>
            </div>
          </div>
        </div>
      </div>

      <div class="pane-resize" id="resize-right"></div>

      <!-- RIGHT: Agent Messages -->
      <div class="pane pane-right" id="pane-messages">
        <div class="pane-header">
          <span>Agent Chat</span>
          <span id="agent-tmux-cmd" class="sup-tmux"></span>
        </div>
        <div class="pane-scroll" id="messages-scroll">
          <div class="pane-spacer"></div>
          <div class="sup-empty">loading<span class="cursor"></span></div>
        </div>
        <div class="send-area" id="send-area"></div>
      </div>
    </div>
  </div>

  <!-- Review detail modal -->
  <div class="review-modal-overlay" id="review-modal">
    <div class="review-modal">
      <div class="rm-header">
        <div class="rm-title" id="rm-title"></div>
        <button class="rm-close" id="rm-close">ESC</button>
      </div>
      <div class="rm-body" id="rm-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <!-- graph removed — replaced by live action stream -->
  <script>
    const pid = window.location.pathname.split('/').pop();
    const MAX_CONTEXT = 1000000;

    function escapeHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
    function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : ''; }
    function formatTokens(n) { return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n); }

    // Configure marked for markdown rendering
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true,
    });

    // Render markdown with code block wrappers
    function renderMarkdown(text) {
      if (!text) return '';
      let html = marked.parse(text);
      // Wrap pre>code blocks with language label and copy button
      html = html.replace(/<pre><code class="language-(\w+)">/g,
        '<div class="code-block-wrapper"><span class="code-lang">$1</span><pre><code class="language-$1">');
      html = html.replace(/<\/code><\/pre>/g, '</code></pre></div>');
      return html;
    }

    // --- Session info ---
    let currentSession = null;

    let allSessions = [];

    async function loadSessionInfo() {
      const res = await fetch('/api/sessions');
      allSessions = await res.json();
      currentSession = allSessions.find(s => s.pid === Number(pid));
      if (!currentSession) return;

      document.title = `ccboard — ${currentSession.shortName}`;

      // Build session tabs
      const tabsEl = document.getElementById('session-tabs');
      tabsEl.innerHTML = allSessions.map((s, i) => {
        const isActive = s.pid === Number(pid);
        return `<a href="/session/${s.pid}" class="session-tab ${s.status}${isActive ? ' active' : ''}">
          <span class="st-name">${escapeHtml(s.shortName)}</span>
          <span class="st-status">${s.status}</span>
        </a>`;
      }).join('');

      // Keyboard shortcuts: Shift+Left/Right to cycle sessions
      const currentIdx = allSessions.findIndex(s => s.pid === Number(pid));
      document.addEventListener('keydown', (e) => {
        // Only when not focused on an input
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.shiftKey && e.key === 'ArrowRight') {
          e.preventDefault();
          const next = allSessions[currentIdx + 1];
          if (next) window.location.href = '/session/' + next.pid;
        }
        if (e.shiftKey && e.key === 'ArrowLeft') {
          e.preventDefault();
          const prev = allSessions[currentIdx - 1];
          if (prev) window.location.href = '/session/' + prev.pid;
        }
      });

      // Show agent tmux command if managed
      const agentTmuxEl = document.getElementById('agent-tmux-cmd');
      if (currentSession.tmuxSession) {
        agentTmuxEl.textContent = 'tmux attach -t ' + currentSession.tmuxSession;
        agentTmuxEl.onclick = () => {
          navigator.clipboard.writeText('tmux attach -t ' + currentSession.tmuxSession);
          agentTmuxEl.textContent = 'copied!';
          setTimeout(() => { agentTmuxEl.textContent = 'tmux attach -t ' + currentSession.tmuxSession; }, 1500);
        };
      }
    }

    // --- Context ---
    async function loadContext() {
      const res = await fetch(`/api/sessions/${pid}/context`);
      const ctx = await res.json();
      const total = ctx.totalContextTokens || 0;
      const pct = total > 0 ? Math.round((total / MAX_CONTEXT) * 100) : 0;

      document.getElementById('ctx-tokens').textContent = formatTokens(total);
      document.getElementById('ctx-turns').textContent = ctx.totalTurns || 0;
      document.getElementById('ctx-tools').textContent = ctx.totalToolCalls || 0;

      const pctEl = document.getElementById('ctx-pct');
      pctEl.textContent = pct + '%';
      pctEl.className = 'v' + (pct > 80 ? ' crit' : pct > 50 ? ' warn' : '');

      const fill = document.getElementById('token-fill');
      fill.style.width = Math.min(pct, 100) + '%';
      fill.className = 'token-bar-fill ' + (pct > 80 ? 'crit' : pct > 50 ? 'warn' : 'ok');
    }

    // --- Live Actions (center pane top) ---
    let actionCount = 0;
    const paneEventsSeen = new Set();

    // Store full action data for popups
    const actionDataStore = [];

    function addActionEvent(type, tool, detail, timestamp, fullData) {
      const stream = document.getElementById('actions-stream');
      if (!stream) return;

      const empty = stream.querySelector('.sup-empty');
      if (empty) empty.remove();

      const idx = actionDataStore.length;
      actionDataStore.push({ type, tool, detail, timestamp, ...(fullData || {}) });

      actionCount++;
      const statusEl = document.getElementById('actions-status');
      if (statusEl) statusEl.textContent = actionCount + ' actions';

      const time = timestamp ? new Date(timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
      const toolLower = (tool || '').toLowerCase();
      const toolClass = `tool-${toolLower}`;

      const div = document.createElement('div');
      div.className = `action-event ${toolClass}`;
      div.style.cursor = 'pointer';
      div.setAttribute('data-idx', idx);
      div.innerHTML = `
        <span class="ae-time">${time}</span>
        <span class="ae-tool">${escapeHtml(tool || type)}</span>
        <span class="ae-detail">${escapeHtml(detail)}</span>
      `;
      div.addEventListener('click', () => openActionDetail(idx));
      stream.appendChild(div);

      while (stream.children.length > 201) {
        const first = stream.querySelector('.action-event');
        if (first) first.remove();
        else break;
      }

      stream.scrollTop = stream.scrollHeight;
    }

    function openActionDetail(idx) {
      const data = actionDataStore[idx];
      if (!data) return;

      const modal = document.getElementById('review-modal');
      const toolColor = {
        'Read': 'var(--cyan)', 'Edit': 'var(--amber)', 'Write': '#bb66dd',
        'Bash': 'var(--text-bright)', 'Grep': 'var(--green)', 'Glob': 'var(--green)',
        'Agent': '#cc66dd', 'THINK': 'var(--text-dim)', 'YOU': 'var(--amber)',
      }[data.tool] || 'var(--text)';

      const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';

      document.getElementById('rm-title').innerHTML = `<span style="color:${toolColor};font-size:14px;font-weight:600;">${escapeHtml(data.tool || data.type)}</span><span style="color:var(--text-dim);margin-left:8px;">${time}</span>`;

      let html = '';

      // Summary
      html += `<div style="padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px;">
        <div style="font-size:13px;color:var(--text-bright);line-height:1.5;">${escapeHtml(data.detail || '')}</div>
      </div>`;

      // Tool-specific details
      if (data.tool === 'Bash' || data.tool === 'bash') {
        if (data.command) {
          html += `<div style="margin-bottom:16px;">
            <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">COMMAND</div>
            <pre style="background:var(--bg);border:1px solid var(--border);padding:12px 16px;font-size:12px;color:var(--text-bright);white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono','Share Tech Mono',monospace;line-height:1.5;max-height:200px;overflow-y:auto;">${escapeHtml(data.command)}</pre>
          </div>`;
        }
        if (data.description) {
          html += `<div style="margin-bottom:16px;">
            <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">DESCRIPTION</div>
            <div style="font-size:12px;color:var(--text);line-height:1.5;">${escapeHtml(data.description)}</div>
          </div>`;
        }
      }

      if (data.tool === 'Read' || data.tool === 'read') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">FILE</div>
          <div style="font-size:13px;color:var(--cyan);font-family:'JetBrains Mono','Share Tech Mono',monospace;padding:8px 12px;background:var(--bg);border:1px solid var(--border);">${escapeHtml(data.filePath || data.detail)}</div>
        </div>`;
      }

      if (data.tool === 'Edit' || data.tool === 'edit') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">FILE</div>
          <div style="font-size:13px;color:var(--amber);font-family:'JetBrains Mono','Share Tech Mono',monospace;padding:8px 12px;background:var(--bg);border:1px solid var(--border);margin-bottom:12px;">${escapeHtml(data.filePath || data.detail)}</div>
        </div>`;
        if (data.oldString) {
          html += `<div style="margin-bottom:16px;">
            <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">REMOVED</div>
            <pre style="background:#1a0808;border:1px solid #331111;border-left:3px solid #662222;padding:12px 16px;font-size:11px;color:#cc6666;white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono','Share Tech Mono',monospace;line-height:1.5;max-height:250px;overflow-y:auto;">${escapeHtml(data.oldString)}</pre>
          </div>`;
        }
        if (data.newString) {
          html += `<div style="margin-bottom:16px;">
            <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">ADDED</div>
            <pre style="background:#081a08;border:1px solid #113311;border-left:3px solid #226622;padding:12px 16px;font-size:11px;color:#66cc66;white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono','Share Tech Mono',monospace;line-height:1.5;max-height:250px;overflow-y:auto;">${escapeHtml(data.newString)}</pre>
          </div>`;
        }
      }

      if (data.tool === 'Write' || data.tool === 'write') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">FILE WRITTEN</div>
          <div style="font-size:13px;color:#bb66dd;font-family:'JetBrains Mono','Share Tech Mono',monospace;padding:8px 12px;background:var(--bg);border:1px solid var(--border);">${escapeHtml(data.filePath || data.detail)}</div>
        </div>`;
        if (data.newString) {
          html += `<div style="margin-bottom:16px;">
            <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">CONTENT</div>
            <pre style="background:#081a08;border:1px solid #113311;border-left:3px solid #226622;padding:12px 16px;font-size:11px;color:#66cc66;white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono','Share Tech Mono',monospace;line-height:1.5;max-height:300px;overflow-y:auto;">${escapeHtml(data.newString)}</pre>
          </div>`;
        }
      }

      if (data.tool === 'Grep' || data.tool === 'grep') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">SEARCH</div>
          <div style="font-size:13px;color:var(--green);font-family:'JetBrains Mono','Share Tech Mono',monospace;padding:8px 12px;background:var(--bg);border:1px solid var(--border);">/${escapeHtml(data.pattern || '')}/ ${data.path ? 'in ' + escapeHtml(data.path) : ''}</div>
        </div>`;
      }

      if (data.tool === 'THINK' || data.type === 'think') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">CLAUDE'S RESPONSE</div>
          <div style="font-size:12px;color:var(--text);line-height:1.6;padding:12px 16px;background:var(--bg);border:1px solid var(--border);max-height:400px;overflow-y:auto;">${data.text ? renderMarkdown(data.text) : escapeHtml(data.detail)}</div>
        </div>`;
      }

      if (data.tool === 'YOU' || data.type === 'human') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">YOUR MESSAGE</div>
          <div style="font-size:12px;color:var(--amber);line-height:1.6;padding:12px 16px;background:var(--bg);border:1px solid var(--border);">${escapeHtml(data.detail || data.text || '')}</div>
        </div>`;
      }

      if (data.tool === 'Agent' || data.tool === 'agent') {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">AGENT SPAWNED</div>
          <div style="font-size:12px;color:#cc66dd;line-height:1.5;padding:12px 16px;background:var(--bg);border:1px solid var(--border);">${escapeHtml(data.description || data.detail || '')}</div>
        </div>`;
      }

      // If nothing specific rendered, show raw detail
      if (!html.includes('COMMAND') && !html.includes('FILE') && !html.includes('RESPONSE') && !html.includes('MESSAGE') && !html.includes('SEARCH') && !html.includes('AGENT')) {
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:12px;color:var(--text);line-height:1.6;padding:12px 16px;background:var(--bg);border:1px solid var(--border);">${escapeHtml(data.detail || JSON.stringify(data, null, 2))}</div>
        </div>`;
      }

      document.getElementById('rm-body').innerHTML = html;
      modal.classList.add('open');
    }


    // Load historical actions from the API on init
    async function loadHistoricalActions() {
      try {
        const res = await fetch(`/api/sessions/${pid}/actions`);
        const turns = await res.json();
        for (const turn of turns) {
          if (turn.humanMessage) {
            addActionEvent('human', 'YOU', turn.humanMessage.split('\n')[0].slice(0, 100), turn.timestamp, { text: turn.humanMessage });
          }
          for (const a of turn.actions) {
            if (a.type === 'tool_use') {
              const detail = a.command || a.filePath || a.pattern || a.description || a.tool || '';
              addActionEvent('action', a.tool, detail, a.timestamp, a);
            } else if (a.type === 'assistant_text') {
              addActionEvent('think', 'THINK', a.text?.split('\n')[0]?.slice(0, 100), a.timestamp, { text: a.text });
            }
          }
        }
      } catch {}
    }

    function connectActionStream() {
      const es = new EventSource(`/api/sessions/${pid}/action-stream`);
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'connected') return;

          // JSONL-sourced events
          if (data.type === 'action') {
            addActionEvent('action', data.tool, data.detail, data.timestamp, data);
          }
          if (data.type === 'thinking') {
            addActionEvent('think', 'THINK', data.text?.split('\n')[0]?.slice(0, 100), data.timestamp, { text: data.text });
          }
          // results skipped — tool_use action already shows what happened

          // Pane-sourced events — dedup to avoid repeating
          if (data.type === 'status') {
            const statusEl = document.getElementById('actions-status');
            if (statusEl) statusEl.textContent = data.text;
          }
          if (data.type === 'subagent' || data.type === 'agents') {
            const key = data.type + '|' + data.text;
            if (!paneEventsSeen.has(key)) {
              paneEventsSeen.add(key);
              addActionEvent('agent', data.type === 'agents' ? 'AGENTS' : 'AGENT', data.text);
            }
          }
          if (data.type === 'result') {
            const key = 'result|' + data.text;
            if (!paneEventsSeen.has(key)) {
              paneEventsSeen.add(key);
              addActionEvent('result', '  ⎿', data.text);
            }
          }
          if (data.type === 'waiting') {
            const statusEl = document.getElementById('actions-status');
            if (statusEl) statusEl.textContent = 'idle';
          }
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectActionStream, 3000);
      };
    }

    // --- Messages (right pane) ---
    async function loadMessages() {
      const res = await fetch(`/api/sessions/${pid}/messages`);
      const messages = await res.json();
      const scroll = document.getElementById('messages-scroll');

      if (messages.length === 0) {
        scroll.innerHTML = '<div class="pane-spacer"></div><div class="sup-empty">no messages</div>';
      } else {
        scroll.innerHTML = '<div class="pane-spacer"></div>' + messages.map(m => {
          return `<div class="message ${m.role}">
            <div class="message-head"><span class="message-role">${m.role==='human'?'YOU':'CLAUDE'}</span><span class="message-time">${formatTime(m.timestamp)}</span></div>
            <div class="message-text">${m.role === 'human' ? escapeHtml(m.text) : renderMarkdown(m.text)}</div>
          </div>`;
        }).join('');
      }
      scroll.scrollTop = scroll.scrollHeight;

      // Send area
      const s = currentSession;
      const canSend = s?.status === 'waiting' && s?.managed;
      let ph = 'Session not waiting';
      if (s?.status === 'waiting' && !s?.managed) ph = 'Launch via ccboard to send';
      if (canSend) ph = 'Type a message...';

      if (canSend) ph = '/ for commands, or type a message...';
      document.getElementById('send-area').innerHTML = `
        <div class="slash-menu" id="agent-slash-menu"></div>
        <div class="send-bar">
          <input type="text" class="send-input" id="send-input" placeholder="${ph}" ${canSend?'':'disabled'} />
          <button class="send-btn" id="send-btn" ${canSend?'':'disabled'}>SEND</button>
        </div>
        <div class="send-status" id="send-status"></div>`;

      const input = document.getElementById('send-input');
      const btn = document.getElementById('send-btn');
      const status = document.getElementById('send-status');

      btn?.addEventListener('click', () => sendToAgent());
      input?.addEventListener('keydown', e => { if(e.key==='Enter' && !document.querySelector('#agent-slash-menu.open')) sendToAgent(); });
    }

    // Send a choice for interactive prompts (plan mode, permissions)
    async function sendInteractiveChoice(value) {
      if (!value) return;
      try {
        await fetch(`/api/sessions/${pid}/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: value }),
        });
        // Remove the interactive prompt
        const live = document.getElementById('agent-live-output');
        if (live) live.remove();
      } catch (e) {
        console.error('interactive send failed:', e);
      }
    }
    // Expose globally for onclick handlers
    window.sendInteractiveChoice = sendInteractiveChoice;

    async function sendToAgent(messageOverride) {
      const input = document.getElementById('send-input');
      const status = document.getElementById('send-status');
      const text = messageOverride || (input ? input.value.trim() : '');
      if (!text) return;
      if (input) input.disabled = true;
      if (status) status.textContent = 'sending...';
      try {
        const r = await fetch(`/api/sessions/${pid}/send`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:text}), keepalive:true });
        const d = await r.json();
        if (d.ok) { if (status) status.textContent='sent'; if (input) { input.value=''; input.focus(); } }
        else { if (status) { status.textContent=d.error; status.className='send-status error'; } }
      } catch(e) { if (status) { status.textContent=e.message; status.className='send-status error'; } }
      if (input) input.disabled = false;
    }

    // --- Supervisor Chat (left pane) ---
    const REVIEW_ICONS = { ok:'✓', warning:'⚠', issue:'✗' };
    const REVIEW_LABELS = { codeQuality:'CODE QUALITY', security:'SECURITY', scalability:'SCALABILITY', contextDrift:'CONTEXT DRIFT' };
    let currentReviewData = null;
    let supervisorActive = false;
    let supPollInterval = null;

    async function loadSupervisorChat() {
      const statusRes = await fetch(`/api/sessions/${pid}/supervisor`);
      const status = await statusRes.json();

      const statusText = document.getElementById('sup-status-text');
      const emptyState = document.getElementById('sup-empty-state');
      const sendArea = document.getElementById('sup-send-area');
      const chatContent = document.getElementById('sup-chat-content');

      if (!status.active) {
        // Auto-start supervisor if session is managed
        if (currentSession?.managed) {
          chatContent.innerHTML = `<div class="sup-empty">starting supervisor<span class="cursor"></span></div>`;
          statusText.textContent = 'starting...';
          await startSupervisor();
          return;
        }
        supervisorActive = false;
        chatContent.innerHTML = `<div class="sup-empty">supervisor requires a ccboard-managed session</div>`;
        statusText.textContent = '';
        if (supPollInterval) { clearInterval(supPollInterval); supPollInterval = null; }
        return;
      }

      supervisorActive = true;
      sendArea.style.display = '';
      statusText.textContent = status.isWaiting ? 'ready' : 'thinking...';

      // Show supervisor tmux command in header
      const supTmuxEl = document.getElementById('sup-tmux-cmd');
      if (status.tmuxSession) {
        supTmuxEl.textContent = 'tmux attach -t ' + status.tmuxSession;
        supTmuxEl.onclick = () => {
          navigator.clipboard.writeText('tmux attach -t ' + status.tmuxSession);
          supTmuxEl.textContent = 'copied!';
          setTimeout(() => { supTmuxEl.textContent = 'tmux attach -t ' + status.tmuxSession; }, 1500);
        };
      }

      // Load last 50 messages fast, render immediately
      const msgRes = await fetch(`/api/sessions/${pid}/supervisor/messages?limit=50`);
      const messages = await msgRes.json();

      const scroll = document.getElementById('sup-chat-scroll');

      function renderSupMessages(msgs) {
        return msgs.map(m => `
          <div class="message ${m.role}">
            <div class="message-head">
              <span class="message-role">${m.role==='human'?'YOU':'SUPERVISOR'}</span>
              <span class="message-time">${formatTime(m.timestamp)}</span>
            </div>
            <div class="message-text">${m.role === 'human' ? escapeHtml(m.text) : renderMarkdown(m.text)}</div>
          </div>
        `).join('');
      }

      if (messages.length === 0) {
        chatContent.innerHTML = `<div class="sup-empty">supervisor starting<span class="cursor"></span></div>`;
      } else {
        chatContent.innerHTML = renderSupMessages(messages);
      }

      scroll.scrollTop = scroll.scrollHeight;

      // Then load full history in the background and prepend older messages
      if (messages.length >= 50) {
        fetch(`/api/sessions/${pid}/supervisor/messages`).then(r => r.json()).then(allMsgs => {
          if (allMsgs.length > messages.length) {
            const olderMsgs = allMsgs.slice(0, allMsgs.length - messages.length);
            const olderHtml = renderSupMessages(olderMsgs);
            // Prepend before the existing messages, after the spacer
            const spacer = scroll.querySelector('.pane-spacer');
            const frag = document.createElement('div');
            frag.innerHTML = olderHtml;
            while (frag.lastChild) {
              if (spacer) spacer.after(frag.firstChild);
              else scroll.prepend(frag.firstChild);
            }
          }
        }).catch(() => {});
      }

      // Enable/disable input
      const input = document.getElementById('sup-input');
      const btn = document.getElementById('sup-send-btn');
      if (status.isWaiting) {
        input.disabled = false;
        btn.disabled = false;
        input.placeholder = 'Talk to supervisor...';
      } else {
        input.disabled = true;
        btn.disabled = true;
        input.placeholder = 'Supervisor is thinking...';
      }

      // SSE handles real-time updates now
    }

    async function startSupervisor() {
      await fetch(`/api/sessions/${pid}/supervisor/start`, {method:'POST'});
      // SSE handles real-time updates
    }

    async function sendToSupervisor(messageOverride) {
      const input = document.getElementById('sup-input');
      const status = document.getElementById('sup-send-status');
      const text = messageOverride || input.value.trim();
      if (!text) return;

      input.disabled = true;
      status.textContent = 'sending...';
      try {
        const r = await fetch(`/api/sessions/${pid}/supervisor/send`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: text}),
          keepalive: true,
        });
        const d = await r.json();
        if (d.ok) { input.value = ''; status.textContent = ''; }
        else { status.textContent = d.error; status.className = 'send-status error'; }
      } catch(e) { status.textContent = e.message; status.className = 'send-status error'; }
      input.disabled = false;
      input.focus();
    }

    document.getElementById('sup-send-btn').addEventListener('click', () => sendToSupervisor());
    document.getElementById('sup-input').addEventListener('keydown', e => { if(e.key==='Enter' && !document.querySelector('#sup-slash-menu.open')) sendToSupervisor(); });

    // --- Reviews (bottom of center pane) ---
    // Store all review reports for detail popups
    let reviewReports = {};

    async function loadReviews() {
      try {
        const r = await fetch(`/api/sessions/${pid}/supervisor/reviews`);
        const data = await r.json();
        const container = document.getElementById('reviews-content');
        const timestamp = document.getElementById('review-timestamp');

        if (!data.categories || data.categories.length === 0) {
          container.innerHTML = '<div class="sup-empty">no reviews yet — ask the supervisor to run a review</div>';
          timestamp.textContent = '';
          return;
        }

        // Store reports for detail popups
        reviewReports = {};
        for (const cat of data.categories) {
          reviewReports[cat.category] = cat.report;
        }

        // Show latest timestamp
        const withTimestamps = data.categories.filter(c => c.timestamp);
        if (withTimestamps.length > 0) {
          const latest = withTimestamps.reduce((a, b) => (a.timestamp > b.timestamp ? a : b));
          if (latest.timestamp) timestamp.textContent = formatTime(latest.timestamp);
        }

        let html = '';
        for (const cat of data.categories) {
          const st = cat.status || 'ok';
          const icon = REVIEW_ICONS[st] || '?';
          const fc = cat.findingCount || cat.report?.findings?.length || cat.report?.action_items?.length || 0;
          const label = cat.category.toUpperCase().replace(/-/g, ' ');
          const isVerdict = cat.isVerdict;
          const verdictClass = isVerdict ? ' verdict-row' : '';
          html += `<div class="sup-review-item ${st}${verdictClass}" data-cat="${escapeHtml(cat.category)}">
            <span class="sup-review-icon ${st}">${isVerdict ? '⚖' : icon}</span>
            <span class="sup-review-label">${label}</span>
            <span class="sup-review-detail">${escapeHtml(cat.summary)}${fc?' ('+fc+')':''}</span>
          </div>`;
        }
        container.innerHTML = html;

        // Attach click handlers
        container.querySelectorAll('.sup-review-item').forEach(el => {
          el.addEventListener('click', () => openReportModal(el.dataset.cat));
        });
      } catch (err) {
        console.error('loadReviews failed:', err);
        document.getElementById('reviews-content').innerHTML = '<div class="sup-empty">no reviews yet</div>';
      }
    }

    // --- Report Detail Modal ---
    function openReportModal(category) {
      const report = reviewReports[category];
      if (!report) return;

      const st = report.status || report.overall_score || 'ok';
      const icon = category === 'council-verdict' ? '⚖' : (REVIEW_ICONS[st] || '?');
      const label = category.toUpperCase().replace(/-/g, ' ');
      const modal = document.getElementById('review-modal');
      document.getElementById('rm-title').innerHTML = `<span class="sup-review-icon ${st}" style="font-size:14px">${icon}</span><span>${label}</span>`;

      // Council verdict has a different structure — render it specially
      if (category === 'council-verdict') {
        let html = '';

        // Executive summary
        const execSummary = report.executive_summary || report.executiveSummary || '';
        if (execSummary) {
          html += `<div class="rm-section"><div class="rm-section-title">Executive Summary</div><div class="rm-summary">${escapeHtml(execSummary)}</div></div>`;
        }

        // Council scores (supports council_scores, councilMembers, council_status)
        const scores = report.council_scores || report.councilMembers || report.council_status || {};
        if (Object.keys(scores).length > 0) {
          html += `<div class="rm-section"><div class="rm-section-title">Council Scores</div>`;
          for (const [member, data] of Object.entries(scores)) {
            const score = typeof data === 'string' ? data : (data.verdict || data.score || data.status || data.rating || '?');
            const topFinding = typeof data === 'object' ? (data.top_finding || data.topFinding || data.trust_score || '') : '';
            const scoreIcon = score === 'PASS' || score === 'pass' || score === 'ok' ? '✓'
              : score === 'WARN' || score === 'warn' || score === 'warning' ? '⚠'
              : score === 'FAIL' || score === 'fail' || score === 'critical' ? '✗' : '?';
            const scoreColor = scoreIcon === '✓' ? 'var(--green-dim,#6a6)' : scoreIcon === '⚠' ? 'var(--amber-dim)' : scoreIcon === '✗' ? 'var(--red-dim)' : 'var(--text-dim)';
            html += `<div style="display:flex;gap:8px;padding:4px 6px;background:var(--bg);margin-bottom:1px;align-items:baseline;">
              <span style="font-size:11px;color:${scoreColor}">${scoreIcon}</span>
              <span style="font-size:10px;color:var(--text-bright);min-width:120px;text-transform:uppercase;letter-spacing:1px;">${member.replace(/-/g,' ').replace(/_/g,' ')}</span>
              <span style="font-size:10px;color:var(--text-dim);flex:1;">${escapeHtml(topFinding)}</span>
            </div>`;
          }
          html += `</div>`;
        }

        // Action items (from normalised findings with _group tags)
        const findings = report.findings || [];
        if (findings.length > 0) {
          const groups = {};
          for (const f of findings) {
            const g = f._group || 'current';
            if (!groups[g]) groups[g] = [];
            groups[g].push(f);
          }
          const groupLabels = { 'fix-now': 'Fix Now', 'fix-sprint': 'Fix This Sprint', 'new': 'New Findings', 'current': 'Action Items' };
          for (const [g, items] of Object.entries(groups)) {
            const label = groupLabels[g] || g;
            html += `<div class="rm-section"><div class="rm-section-title">${label} (${items.length})</div>`;
            for (const item of items) {
              const priority = item.severity || item.priority || item.urgency || 'medium';
              const sevColor = priority === 'critical' || priority === 'fix-now' ? 'var(--red-dim)' : priority === 'high' || priority === 'issue' ? 'var(--amber-dim)' : 'var(--text-dim)';
              html += `<div class="rm-finding" style="border-left-color:${sevColor}">
                <div class="rm-finding-head">
                  <span class="rm-finding-severity" style="color:${sevColor};border-color:${sevColor}">${escapeHtml(priority)}</span>
                  ${item.source ? `<span style="font-size:8px;color:var(--cyan-dim)">${escapeHtml(item.source)}</span>` : ''}
                </div>
                <div class="rm-finding-desc">${escapeHtml(item.title || item.description || item.finding || '')}</div>
                ${item.reason || item.productImpact ? `<div class="rm-finding-suggestion">→ ${escapeHtml(item.reason || item.productImpact || '')}</div>` : ''}
              </div>`;
            }
            html += `</div>`;
          }
        }

        // Conflicts
        const conflicts = report.conflicts_and_resolutions || report.conflicts || [];
        if (Array.isArray(conflicts) && conflicts.length > 0) {
          html += `<div class="rm-section"><div class="rm-section-title">Conflicts & Resolutions (${conflicts.length})</div>`;
          for (const c of conflicts) {
            html += `<div style="padding:6px 8px;background:var(--bg);margin-bottom:2px;font-size:10px;">
              <div style="color:var(--text-bright);margin-bottom:3px;">${escapeHtml(c.area || c.topic || '')}</div>
              <div style="color:var(--text-dim);">${escapeHtml(c.resolution || c.verdict || '')}</div>
            </div>`;
          }
          html += `</div>`;
        }

        document.getElementById('rm-body').innerHTML = html || '<div class="rm-no-findings">No verdict details</div>';
        modal.classList.add('open');
        return;
      }

      let html = '';

      // Summary (may be string or object)
      const summaryText = typeof report.summary === 'string' ? report.summary
        : (report.executive_summary || report.verdict_rationale || report.scale_projections?.notes || '');
      if (summaryText) {
        html += `<div class="rm-section"><div class="rm-section-title">Summary</div><div class="rm-summary">${escapeHtml(summaryText)}</div></div>`;
      }

      // Metadata
      const meta = [];
      if (report.runType) meta.push(['Run type', report.runType]);
      if (report.language) meta.push(['Language', report.language]);
      if (report.framework) meta.push(['Framework', report.framework]);
      if (report.anchor?.commitHash) meta.push(['Anchor', report.anchor.commitHash.slice(0, 7)]);
      if (report.new_head) meta.push(['Head', report.new_head.slice(0, 7)]);
      if (report.verdict) meta.push(['Verdict', report.verdict.toUpperCase()]);
      if (report.filesAnalysed?.length) meta.push(['Files', report.filesAnalysed.map(f => `<span class="file-tag">${escapeHtml(f)}</span>`).join('')]);
      if (report.scale_projections?.safe_concurrent_calls) meta.push(['Safe concurrency', report.scale_projections.safe_concurrent_calls]);
      if (report.scale_projections?.bottleneck_component) meta.push(['Bottleneck', report.scale_projections.bottleneck_component]);

      if (meta.length) {
        html += `<div class="rm-section"><div class="rm-section-title">Details</div>`;
        for (const [k, v] of meta) {
          html += `<div class="rm-method-row"><div class="rm-method-label">${k}</div><div class="rm-method-value">${escapeHtml(String(v))}</div></div>`;
        }
        html += `</div>`;
      }

      // Render a group of findings
      function renderFindings(items, groupTitle) {
        if (!Array.isArray(items) || items.length === 0) return '';
        let h = `<div class="rm-section"><div class="rm-section-title">${groupTitle} (${items.length})</div>`;
        for (const f of items) {
          const sev = (f.severity || f.status || 'low').toLowerCase();
          const loc = f.location || f.file || '';
          const locStr = typeof loc === 'object' ? `${loc.file || ''}:${loc.line || ''}` : loc;
          const lineStr = f.line ? `${f.file || ''}:${f.line}` : locStr;

          h += `<div class="rm-finding ${sev}">
            <div class="rm-finding-head">
              <span class="rm-finding-severity">${escapeHtml(sev)}</span>
              ${f.confidence ? `<span style="font-size:8px;color:var(--text-dim);border:1px solid var(--border);padding:1px 4px;letter-spacing:1px;">CONF: ${f.confidence}</span>` : ''}
              ${f.impact && typeof f.impact === 'string' && f.impact.length <= 20 ? `<span style="font-size:8px;color:var(--text-dim);border:1px solid var(--border);padding:1px 4px;letter-spacing:1px;">IMPACT: ${f.impact}</span>` : ''}
              ${lineStr ? `<span class="rm-finding-location">${escapeHtml(lineStr)}</span>` : ''}
            </div>
            ${f.title ? `<div style="font-size:11px;color:var(--text-bright);margin-bottom:3px;font-weight:500;">${escapeHtml(f.title)}</div>` : ''}
            <div class="rm-finding-desc">${escapeHtml(f.description || f.detail || '')}</div>
            ${f.impact && typeof f.impact === 'string' && f.impact.length > 20 ? `<div style="font-size:9px;color:var(--amber-dim);margin-bottom:3px;">Impact: ${escapeHtml(f.impact)}</div>` : ''}
            ${f.resolution ? `<div style="font-size:10px;color:var(--green-dim,#6a6);margin-bottom:3px;">✓ ${escapeHtml(f.resolution)}</div>` : ''}
            ${f.recommendation ? `<div class="rm-finding-suggestion">→ ${escapeHtml(f.recommendation)}</div>` : ''}
            ${f.suggestion ? `<div class="rm-finding-suggestion">→ ${escapeHtml(f.suggestion)}</div>` : ''}
            ${f.evidence ? `<div class="rm-finding-evidence">${escapeHtml(f.evidence)}</div>` : ''}
            ${f.discrepancy ? `<div style="font-size:10px;color:var(--red-dim);margin-top:3px;">${escapeHtml(f.discrepancy)}</div>` : ''}
            ${f.tags?.length ? `<div style="margin-top:3px;">${f.tags.map(t => `<span style="font-size:8px;padding:1px 4px;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);margin-right:2px;">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          </div>`;
        }
        h += `</div>`;
        return h;
      }

      // Group findings by _group tag (set by normaliser)
      const findings = report.findings || [];
      if (findings.length === 0) {
        html += `<div class="rm-section"><div class="rm-section-title">Findings</div><div class="rm-no-findings">No issues found</div></div>`;
      } else {
        const groups = {};
        for (const f of findings) {
          const g = f._group || 'current';
          if (!groups[g]) groups[g] = [];
          groups[g].push(f);
        }
        const groupLabels = { 'new': 'New Findings', 'unchanged': 'Unchanged', 'resolved': 'Resolved', 'current': 'Findings', 'fix-now': 'Fix Now', 'fix-sprint': 'Fix This Sprint' };
        for (const [g, items] of Object.entries(groups)) {
          html += renderFindings(items, groupLabels[g] || g);
        }
      }

      document.getElementById('rm-body').innerHTML = html;
      modal.classList.add('open');
    }

    document.getElementById('rm-close').addEventListener('click', () => document.getElementById('review-modal').classList.remove('open'));
    document.getElementById('review-modal').addEventListener('click', e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('review-modal').classList.remove('open'); });

    // --- Diff popup (for /diff command) ---
    async function showDiffPopup() {
      try {
        // We need a server endpoint for this — use the files endpoint's cwd
        const r = await fetch(`/api/sessions/${pid}/diff`);
        const data = await r.json();

        const modal = document.getElementById('review-modal');
        document.getElementById('rm-title').innerHTML = '<span style="color:var(--cyan)">⎿</span><span>GIT DIFF</span>';
        document.getElementById('rm-body').innerHTML = `
          <div class="rm-section">
            <div class="rm-section-title">Uncommitted changes</div>
            <pre style="background:var(--bg);border:1px solid var(--border);padding:10px;font-size:10px;color:var(--text);white-space:pre-wrap;word-break:break-all;max-height:60vh;overflow-y:auto;font-family:'JetBrains Mono','Share Tech Mono',monospace;">${escapeHtml(data.diff || 'No uncommitted changes')}</pre>
          </div>
          ${data.staged ? `<div class="rm-section">
            <div class="rm-section-title">Staged changes</div>
            <pre style="background:var(--bg);border:1px solid var(--border);padding:10px;font-size:10px;color:var(--text);white-space:pre-wrap;word-break:break-all;max-height:30vh;overflow-y:auto;font-family:'JetBrains Mono','Share Tech Mono',monospace;">${escapeHtml(data.staged)}</pre>
          </div>` : ''}`;
        modal.classList.add('open');
      } catch (e) {
        console.error('diff failed:', e);
      }
    }

    // --- Slash commands ---

    const SUP_COMMANDS = [
      // Analysis
      { cmd: '/review', desc: 'Run all 6 analysis subagents', message: 'run a review' },
      { cmd: '/micro', desc: 'MICRO — code behaviour analysis', message: 'run micro analysis' },
      { cmd: '/macro', desc: 'MACRO — architecture & design analysis', message: 'run macro analysis' },
      { cmd: '/10th-man', desc: '10TH MAN — adversarial micro + macro', message: 'run 10th man micro and 10th man macro analyses' },
      { cmd: '/cc-failures', desc: 'Track agent said vs did', message: 'run cc-failures analysis' },
      { cmd: '/human-failures', desc: 'Track human behaviour patterns', message: 'run human-failures analysis' },
      // Custom
      { cmd: '/agent', desc: 'Spawn custom subagent — /agent "prompt"', message: null },
      // Context
      { cmd: '/task', desc: 'Set current task — /task "description"', message: null },
      { cmd: '/product', desc: 'Set product context — /product "description"', message: null },
      // Session
      { cmd: '/status', desc: 'Show supervisor context and status', message: 'show your current context usage and status' },
      { cmd: '/compact', desc: 'Compact supervisor context', message: '/compact' },
      { cmd: '/clear', desc: 'Restart supervisor with fresh context', action: 'restart-sup' },
      { cmd: '/model', desc: 'Change supervisor model — /model sonnet', message: null, prefix: true },
      { cmd: '/effort', desc: 'Set effort level — /effort high', message: null, prefix: true },
      { cmd: '/plan', desc: 'Enter plan mode', message: '/plan' },
      // Info
      { cmd: '/diff', desc: 'Show git diff', action: 'show-diff' },
      { cmd: '/cost', desc: 'Show token costs for this session', message: 'show token usage and estimated cost for this session' },
    ];

    const AGENT_COMMANDS = [
      // Session control (forwarded to agent via tmux)
      { cmd: '/compact', desc: 'Compact agent context', message: '/compact' },
      { cmd: '/clear', desc: 'Clear agent conversation', message: '/clear' },
      { cmd: '/model', desc: 'Change agent model — /model sonnet', message: null, prefix: true },
      { cmd: '/effort', desc: 'Set agent effort — /effort high', message: null, prefix: true },
      { cmd: '/plan', desc: 'Enter plan mode', message: '/plan' },
      // Info
      { cmd: '/diff', desc: 'Show git diff', action: 'show-diff' },
      { cmd: '/context', desc: 'Show agent context usage', message: '/context' },
      { cmd: '/cost', desc: 'Show agent token usage', message: '/cost' },
      { cmd: '/status', desc: 'Show agent status', message: '/status' },
    ];

    function setupSlashMenu(inputId, menuId, commands, sendFn) {
      // Wait for elements to exist (agent input is created dynamically)
      const check = () => {
        const input = document.getElementById(inputId);
        const menu = document.getElementById(menuId);
        if (!input || !menu) { setTimeout(check, 500); return; }

        let selectedIdx = 0;
        let filtered = [];
        let isOpen = false;

        function render() {
          if (!isOpen || filtered.length === 0) { menu.classList.remove('open'); return; }
          menu.classList.add('open');
          menu.innerHTML = filtered.map((c, i) =>
            `<div class="slash-item${i === selectedIdx ? ' selected' : ''}" data-idx="${i}">
              <span class="slash-cmd">${c.cmd}</span>
              <span class="slash-desc">${c.desc}</span>
            </div>`
          ).join('');
          menu.querySelectorAll('.slash-item').forEach(el => {
            el.addEventListener('mousedown', (e) => {
              e.preventDefault();
              execute(Number(el.dataset.idx));
            });
          });
        }

        function filter(val) {
          if (!val.startsWith('/')) { isOpen = false; render(); return; }
          const q = val.toLowerCase();
          filtered = commands.filter(c => c.cmd.startsWith(q) || c.cmd.includes(q.slice(1)));
          if (filtered.length === 0 && val === '/') filtered = commands;
          selectedIdx = 0;
          isOpen = true;
          render();
        }

        function execute(idx) {
          const cmd = filtered[idx];
          if (!cmd) return;
          isOpen = false;
          render();

          // Actions
          if (cmd.action === 'restart-sup') {
            input.value = '';
            fetch(`/api/sessions/${pid}/supervisor/stop`, { method: 'POST' }).then(() => {
              setTimeout(() => location.reload(), 2000);
            });
            return;
          }

          if (cmd.action === 'show-diff') {
            input.value = '';
            showDiffPopup();
            return;
          }

          // Prefix commands — need an argument after the command
          if (cmd.prefix) {
            const val = input.value.trim();
            const parts = val.split(/\s+/);
            if (parts.length >= 2) {
              // User typed the full command with argument, send it
              input.value = '';
              sendFn(val);
            } else {
              // Tab-completed just the command name, let user type the argument
              input.value = cmd.cmd + ' ';
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            }
            return;
          }

          // Custom agent
          if (cmd.cmd === '/agent') {
            const val = input.value;
            const match = val.match(/^\/agent\s+["']?(.+?)["']?\s*$/);
            if (match) {
              input.value = '';
              setTimeout(() => sendFn('spawn a custom read-only Agent subagent with this prompt: ' + match[1] + '. Write its output to .ccboard/reports/custom-' + Date.now() + '/latest.json with the standard 4 fields (category, status, summary, timestamp) plus whatever findings it produces.'), 50);
            } else {
              input.value = '/agent "';
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            }
            return;
          }

          // Task context
          if (cmd.cmd === '/task') {
            const val = input.value;
            const match = val.match(/^\/task\s+["']?(.+?)["']?\s*$/);
            if (match) {
              input.value = '';
              setTimeout(() => sendFn('I am now working on: ' + match[1] + '. Please update .ccboard/task.md with this task, check what branch I am on, and list the relevant files.'), 50);
            } else {
              input.value = '/task ';
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            }
            return;
          }

          // Product context
          if (cmd.cmd === '/product') {
            const val = input.value;
            const match = val.match(/^\/product\s+["']?(.+?)["']?\s*$/);
            if (match) {
              input.value = '';
              setTimeout(() => sendFn('Here is the product context: ' + match[1] + '. Please update .ccboard/product.md with this information.'), 50);
            } else {
              input.value = '/product ';
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            }
            return;
          }

          // Simple message commands
          if (cmd.message) {
            const msg = cmd.message;
            input.value = '';
            // Use setTimeout to ensure DOM is settled before sending
            setTimeout(() => sendFn(msg), 50);
          }
        }

        input.addEventListener('input', () => filter(input.value));

        input.addEventListener('keydown', (e) => {
          if (!isOpen) return;
          if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, filtered.length - 1); render(); return; }
          if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); render(); return; }
          if (e.key === 'Tab' || (e.key === 'Enter' && isOpen && filtered.length > 0)) {
            e.preventDefault();
            // Tab-complete the command
            if (e.key === 'Tab') {
              input.value = filtered[selectedIdx].cmd + ' ';
              filter(input.value);
            } else {
              execute(selectedIdx);
            }
            return;
          }
          if (e.key === 'Escape') { isOpen = false; render(); e.preventDefault(); return; }
        });

        input.addEventListener('blur', () => { setTimeout(() => { isOpen = false; render(); }, 200); });
      };
      check();
    }

    // --- Real-time SSE streams ---

    // Track last appended message per scroll area to prevent duplicates
    const lastAppended = {};

    function appendMessage(scrollId, role, text, timestamp, roleLabel) {
      const scroll = document.getElementById(scrollId);
      if (!scroll) return;

      // Deduplicate: skip if same text+timestamp was just appended
      const key = scrollId + '|' + role + '|' + (timestamp || '') + '|' + (text || '').slice(0, 100);
      if (lastAppended[scrollId] === key) return;
      lastAppended[scrollId] = key;

      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = `
        <div class="message-head">
          <span class="message-role">${roleLabel || (role === 'human' ? 'YOU' : 'CLAUDE')}</span>
          <span class="message-time">${formatTime(timestamp)}</span>
        </div>
        <div class="message-text">${role === 'human' ? escapeHtml(text) : renderMarkdown(text)}</div>`;
      scroll.appendChild(div);
      scroll.scrollTop = scroll.scrollHeight;
    }

    function connectAgentStream() {
      const es = new EventSource(`/api/sessions/${pid}/stream`);
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'message') {
