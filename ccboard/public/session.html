<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccboard — session</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00aa2a;
      --green-faint: #004d15;
      --amber: #ffb000;
      --amber-dim: #aa7500;
      --amber-faint: #3d2a00;
      --red: #ff3333;
      --red-dim: #aa2222;
      --cyan: #00ffff;
      --cyan-dim: #008888;
      --cyan-faint: #002a2a;
      --bg: #0a0a0a;
      --bg-card: #0d0d0d;
      --bg-card-hover: #121212;
      --border: #1a1a1a;
      --text: #888;
      --text-bright: #ccc;
      --text-dim: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* Full-height flex layout */
    .screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 16px 20px 0;
      max-width: 880px;
      margin: 0 auto;
    }

    /* Header — fixed */
    .header {
      border-bottom: 1px solid #161616;
      padding-bottom: 10px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back {
      color: var(--green-dim);
      text-decoration: none;
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid #1a1a1a;
      transition: border-color 0.15s;
    }

    .back:hover { border-color: var(--green-faint); }

    .session-title {
      font-size: 14px;
      color: var(--text-bright);
      letter-spacing: 1px;
    }

    .session-slug-header {
      font-size: 10px;
      color: #2a2a2a;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
    }

    .status-badge {
      padding: 2px 8px;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-badge.waiting { color: var(--amber); border: 1px solid var(--amber-dim); }
    .status-badge.working { color: var(--cyan); border: 1px solid var(--cyan-dim); }
    .status-badge.idle { color: var(--text-dim); border: 1px solid #222; }

    .tty-badge { color: #333; font-size: 10px; }

    /* Context bar — fixed */
    .context-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin-bottom: 12px;
      background: #111;
      flex-shrink: 0;
    }

    .context-stat {
      background: var(--bg-card);
      padding: 6px 10px;
      text-align: center;
    }

    .context-stat .value { font-size: 15px; color: var(--text-bright); }
    .context-stat .label { font-size: 9px; color: #333; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .context-stat .value.warn { color: var(--amber); }
    .context-stat .value.crit { color: var(--red); }

    /* Token bar — fixed */
    .token-bar-wrap { margin-bottom: 12px; flex-shrink: 0; }
    .token-bar-label { font-size: 10px; color: #333; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .token-bar { height: 3px; background: #111; }
    .token-bar-fill { height: 100%; transition: width 0.3s ease; }
    .token-bar-fill.ok { background: var(--green-faint); }
    .token-bar-fill.warn { background: var(--amber-dim); }
    .token-bar-fill.crit { background: var(--red-dim); }

    /* Tabs — fixed */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-bottom: 1px solid #161616;
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 16px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--green); border-bottom-color: var(--green-dim); }

    /* Tab content — scrollable, fills remaining space */
    .tab-panels {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .tab-content {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .tab-content.active {
      display: flex;
    }

    /* Scrollable area inside each tab */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    /* Push content to bottom so it starts there */
    .scroll-spacer {
      flex: 1;
    }

    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: #1a1a1a; }

    /* Actions panel */
    .action-item {
      padding: 6px 10px;
      border-left: 2px solid #1a1a1a;
      margin-bottom: 2px;
      background: var(--bg-card);
      flex-shrink: 0;
    }

    .action-item.tool_use { border-left-color: var(--cyan-faint); }
    .action-item.assistant_text { border-left-color: var(--green-faint); }
    .action-item.human_message { border-left-color: var(--amber-faint); }

    .action-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .action-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .action-item.tool_use .action-type { color: var(--cyan-dim); }
    .action-item.assistant_text .action-type { color: var(--green-dim); }
    .action-item.human_message .action-type { color: var(--amber-dim); }

    .action-time { font-size: 9px; color: #2a2a2a; }

    .action-detail {
      font-size: 12px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow: hidden;
      position: relative;
    }

    .action-detail.collapsed::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(transparent, var(--bg-card));
    }

    .action-file { font-size: 11px; color: var(--cyan-dim); }
    .action-cmd { font-size: 11px; color: var(--text); background: #080808; padding: 3px 6px; margin-top: 2px; display: inline-block; }
    .action-desc { font-size: 10px; color: #333; }

    /* Messages panel */
    .message {
      padding: 8px 12px;
      margin-bottom: 2px;
      background: var(--bg-card);
      flex-shrink: 0;
    }

    .message.human { border-left: 2px solid var(--amber-faint); }
    .message.assistant { border-left: 2px solid var(--green-faint); }

    .message-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .message-role { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .message.human .message-role { color: var(--amber-dim); }
    .message.assistant .message-role { color: var(--green-dim); }
    .message-time { font-size: 9px; color: #2a2a2a; }

    .message-text {
      font-size: 12px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    /* Send message — pinned at bottom of messages tab */
    .send-area {
      flex-shrink: 0;
      border-top: 1px solid #161616;
      padding: 10px 0;
    }

    .send-bar {
      display: flex;
      gap: 8px;
    }

    .send-input {
      flex: 1;
      background: #080808;
      border: 1px solid #1a1a1a;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .send-input:focus { border-color: var(--green-faint); }
    .send-input::placeholder { color: #2a2a2a; }

    .send-btn {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 11px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .send-btn:hover { background: var(--green-faint); color: var(--green); }

    .send-status {
      font-size: 10px;
      color: var(--green-dim);
      margin-top: 4px;
      min-height: 14px;
    }

    .send-status.error { color: var(--red-dim); }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--green-faint); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--green-faint);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 3px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="header">
      <div class="header-left">
        <a href="/" class="back">← BACK</a>
        <span class="session-title" id="session-title">loading...</span>
        <span class="session-slug-header" id="session-slug"></span>
      </div>
      <div class="header-right">
        <span class="status-badge" id="status-badge"></span>
        <span class="tty-badge" id="tty-badge"></span>
      </div>
    </div>

    <div class="context-bar">
      <div class="context-stat">
        <div class="value" id="ctx-tokens">—</div>
        <div class="label">context tokens</div>
      </div>
      <div class="context-stat">
        <div class="value" id="ctx-turns">—</div>
        <div class="label">turns</div>
      </div>
      <div class="context-stat">
        <div class="value" id="ctx-tools">—</div>
        <div class="label">tool calls</div>
      </div>
      <div class="context-stat">
        <div class="value" id="ctx-pct">—</div>
        <div class="label">context used</div>
      </div>
    </div>

    <div class="token-bar-wrap">
      <div class="token-bar-label">
        <span>CONTEXT WINDOW</span>
        <span id="token-label">— / —</span>
      </div>
      <div class="token-bar">
        <div class="token-bar-fill ok" id="token-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="actions">Actions</button>
      <button class="tab" data-tab="messages">Messages</button>
    </div>

    <div class="tab-panels">
      <div class="tab-content active" id="tab-actions">
        <div class="scroll-area" id="actions-scroll">
          <div class="scroll-spacer"></div>
          <div class="loading">loading actions<span class="cursor"></span></div>
        </div>
      </div>

      <div class="tab-content" id="tab-messages">
        <div class="scroll-area" id="messages-scroll">
          <div class="scroll-spacer"></div>
          <div class="loading">loading messages<span class="cursor"></span></div>
        </div>
        <div class="send-area" id="send-area"></div>
      </div>
    </div>
  </div>

  <script>
    const pid = window.location.pathname.split('/').pop();
    const MAX_CONTEXT = 1000000; // Claude Code 1M context window

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function formatTokens(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    // Tabs — scroll to bottom when switching to a tab
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        const panel = document.getElementById('tab-' + tab.dataset.tab);
        panel.classList.add('active');
        // Scroll the now-visible scroll area to bottom
        requestAnimationFrame(() => {
          const scrollArea = panel.querySelector('.scroll-area');
          if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;
        });
      });
    });

    async function loadSessionInfo() {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();
      const session = sessions.find(s => s.pid === Number(pid));
      if (!session) {
        document.getElementById('session-title').textContent = 'SESSION NOT FOUND';
        return null;
      }

      document.getElementById('session-title').textContent = session.shortName;
      document.getElementById('session-slug').textContent = session.slug || '';
      document.title = `ccboard — ${session.shortName}`;

      const badge = document.getElementById('status-badge');
      badge.textContent = session.status;
      badge.className = 'status-badge ' + session.status;

      document.getElementById('tty-badge').textContent = session.tty;
      return session;
    }

    async function loadContext() {
      const res = await fetch(`/api/sessions/${pid}/context`);
      const ctx = await res.json();

      const total = ctx.totalContextTokens || 0;
      const pct = total > 0 ? Math.round((total / MAX_CONTEXT) * 100) : 0;

      document.getElementById('ctx-tokens').textContent = formatTokens(total);
      document.getElementById('ctx-turns').textContent = ctx.totalTurns || 0;
      document.getElementById('ctx-tools').textContent = ctx.totalToolCalls || 0;

      const pctEl = document.getElementById('ctx-pct');
      pctEl.textContent = pct + '%';
      pctEl.className = 'value' + (pct > 80 ? ' crit' : pct > 50 ? ' warn' : '');

      document.getElementById('token-label').textContent =
        `${formatTokens(total)} / ${formatTokens(MAX_CONTEXT)}`;

      const fill = document.getElementById('token-fill');
      fill.style.width = Math.min(pct, 100) + '%';
      fill.className = 'token-bar-fill ' + (pct > 80 ? 'crit' : pct > 50 ? 'warn' : 'ok');
    }

    async function loadActions() {
      const res = await fetch(`/api/sessions/${pid}/actions`);
      const actions = await res.json();
      const scroll = document.getElementById('actions-scroll');

      if (actions.length === 0) {
        scroll.innerHTML = '<div class="scroll-spacer"></div><div class="loading">no actions recorded</div>';
        return;
      }

      const items = actions.map(a => {
        const time = formatTime(a.timestamp);
        let detail = '';

        switch (a.type) {
          case 'human_message':
            detail = `<div class="action-detail">${escapeHtml(a.text)}</div>`;
            break;
          case 'assistant_text': {
            const text = a.text || '';
            const isLong = text.length > 300;
            detail = `<div class="action-detail${isLong ? ' collapsed' : ''}">${escapeHtml(text)}</div>`;
            break;
          }
          case 'tool_use':
            switch (a.tool) {
              case 'Bash':
                detail = `${a.description ? `<div class="action-desc">${escapeHtml(a.description)}</div>` : ''}
                  <div class="action-cmd">${escapeHtml(a.command || '')}</div>`;
                break;
              case 'Read':
                detail = `<div class="action-file">${escapeHtml(a.filePath || '')}</div>`;
                break;
              case 'Write':
                detail = `<div class="action-file">${escapeHtml(a.filePath || '')}</div>`;
                break;
              case 'Edit':
                detail = `<div class="action-file">${escapeHtml(a.filePath || '')}</div>`;
                break;
              case 'Glob':
                detail = `<div class="action-desc">pattern: ${escapeHtml(a.pattern || '')}</div>`;
                break;
              case 'Grep':
                detail = `<div class="action-desc">/${escapeHtml(a.pattern || '')}/ ${a.path ? 'in ' + escapeHtml(a.path) : ''}</div>`;
                break;
              case 'Agent':
                detail = `<div class="action-desc">${escapeHtml(a.agentType || '')} — ${escapeHtml(a.description || '')}</div>`;
                break;
              default:
                detail = a.input ? `<div class="action-detail collapsed">${escapeHtml(a.input)}</div>` : '';
            }
            break;
        }

        const typeLabel = a.type === 'tool_use' ? a.tool : a.type === 'human_message' ? 'YOU' : 'CLAUDE';

        return `
          <div class="action-item ${a.type}">
            <div class="action-head">
              <span class="action-type">${typeLabel}</span>
              <span class="action-time">${time}</span>
            </div>
            ${detail}
          </div>`;
      }).join('');

      scroll.innerHTML = '<div class="scroll-spacer"></div>' + items;

      // Scroll to bottom
      scroll.scrollTop = scroll.scrollHeight;
    }

    async function loadMessages(session) {
      const res = await fetch(`/api/sessions/${pid}/messages`);
      const messages = await res.json();
      const scroll = document.getElementById('messages-scroll');
      const sendArea = document.getElementById('send-area');

      if (messages.length === 0) {
        scroll.innerHTML = '<div class="scroll-spacer"></div><div class="loading">no messages</div>';
      } else {
        const items = messages.map(m => {
          const time = formatTime(m.timestamp);
          return `
            <div class="message ${m.role}">
              <div class="message-head">
                <span class="message-role">${m.role === 'human' ? 'YOU' : 'CLAUDE'}</span>
                <span class="message-time">${time}</span>
              </div>
              <div class="message-text">${escapeHtml(m.text)}</div>
            </div>`;
        }).join('');

        scroll.innerHTML = '<div class="scroll-spacer"></div>' + items;
      }

      // Scroll to bottom
      scroll.scrollTop = scroll.scrollHeight;

      // Send area
      const isWaiting = session?.status === 'waiting';
      const isManaged = session?.managed;
      const canSend = isWaiting && isManaged;

      let placeholder = 'Session is not waiting for input';
      if (isWaiting && !isManaged) placeholder = 'Not a ccboard session — launch via ccboard to enable sending';
      if (canSend) placeholder = 'Type a message...';

      sendArea.innerHTML = `
        <div class="send-bar">
          <input type="text" class="send-input" id="send-input"
            placeholder="${placeholder}"
            ${!canSend ? 'disabled' : ''} />
          <button class="send-btn" id="send-btn" ${!canSend ? 'disabled' : ''}>SEND</button>
        </div>
        <div class="send-status" id="send-status">${isWaiting && !isManaged ? 'only sessions launched through ccboard support sending' : ''}</div>`;

      const input = document.getElementById('send-input');
      const btn = document.getElementById('send-btn');
      const status = document.getElementById('send-status');

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        btn.disabled = true;
        status.textContent = 'sending...';
        status.className = 'send-status';

        try {
          const res = await fetch(`/api/sessions/${pid}/send`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
          });
          const data = await res.json();
          if (data.ok) {
            status.textContent = 'sent';
            input.value = '';
            input.focus();
            setTimeout(() => { loadActions(); loadMessages(session); }, 4000);
          } else {
            status.textContent = data.error || 'failed';
            status.className = 'send-status error';
          }
        } catch (err) {
          status.textContent = err.message;
          status.className = 'send-status error';
        }
        btn.disabled = false;
      }

      btn?.addEventListener('click', sendMessage);
      input?.addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage();
      });
    }

    async function init() {
      const session = await loadSessionInfo();
      await Promise.all([
        loadContext(),
        loadActions(),
        loadMessages(session),
      ]);
    }

    init();
  </script>
</body>
</html>
