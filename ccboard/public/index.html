<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccboard</title>
  <link rel="stylesheet" href="/ccboard-shell.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00aa2a;
      --green-faint: #004d15;
      --amber: #ffb000;
      --amber-dim: #aa7500;
      --amber-faint: #3d2a00;
      --red: #ff3333;
      --red-dim: #aa2222;
      --red-faint: #331111;
      --cyan: #00ffff;
      --cyan-dim: #008888;
      --cyan-faint: #002a2a;
      --bg: #0a0a0a;
      --bg-card: #0d0d0d;
      --bg-card-hover: #121212;
      --border: #1a1a1a;
      --text: #888;
      --text-bright: #ccc;
      --text-dim: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* CRT scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.06) 2px,
        rgba(0, 0, 0, 0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Subtle vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.97; }
      94% { opacity: 1; }
    }

    .screen {
      animation: flicker 8s infinite;
      padding: 16px 20px;
      max-width: 880px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      border-bottom: 1px solid #161616;
      padding-bottom: 10px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: normal;
      color: var(--green-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header .version {
      font-size: 10px;
      color: #2a2a2a;
    }

    .header .meta {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-dim);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 3px var(--green-dim); }
      50% { opacity: 0.3; box-shadow: none; }
    }

    /* Summary bar */
    .summary {
      display: flex;
      gap: 14px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .summary .sep { color: #1a1a1a; }
    .summary .s-waiting { color: var(--amber-dim); }
    .summary .s-working { color: var(--cyan-dim); }
    .summary .s-idle { color: var(--text-dim); }

    /* Session rows */
    .sessions {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .session {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      align-items: start;
      gap: 10px;
      padding: 9px 10px;
      background: var(--bg-card);
      border-left: 2px solid transparent;
      transition: background 0.15s ease;
      cursor: pointer;
      text-decoration: none;
    }

    a.session { color: inherit; }

    .session:hover {
      background: var(--bg-card-hover);
    }

    .session.waiting { border-left-color: var(--amber); }
    .session.working { border-left-color: var(--cyan); }
    .session.idle { border-left-color: #1a1a1a; }

    /* Stale escalation */
    .session.stale-1 { border-left-color: var(--amber-dim); }
    .session.stale-2 { border-left-color: var(--red-dim); }
    .session.stale-3 {
      border-left-color: var(--red);
      background: var(--red-faint);
    }

    /* Status indicator */
    .status-icon {
      font-size: 12px;
      text-align: center;
      padding-top: 2px;
    }

    .session.waiting .status-icon { color: var(--amber); }
    .session.working .status-icon { color: var(--cyan); }
    .session.idle .status-icon { color: #2a2a2a; }

    @keyframes workPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .session.working .status-icon {
      animation: workPulse 1.5s ease-in-out infinite;
    }

    /* Session info */
    .session-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      overflow: hidden;
      min-width: 0;
    }

    .session-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .session-name {
      font-size: 13px;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session.waiting .session-name { color: var(--amber); }
    .session.working .session-name { color: var(--cyan); }
    .session.idle .session-name { color: var(--text-dim); }

    .session-slug {
      font-size: 10px;
      color: #2a2a2a;
      white-space: nowrap;
    }

    .session-path {
      font-size: 10px;
      color: #2a2a2a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-snippet {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      max-width: 100%;
    }

    .session-snippet .label {
      color: #2a2a2a;
    }

    .session.waiting .session-snippet {
      color: var(--text);
    }

    /* Right side */
    .session-meta {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      white-space: nowrap;
      padding-top: 1px;
    }

    .session-status {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .session.waiting .session-status { color: var(--amber-dim); }
    .session.working .session-status { color: var(--cyan-dim); }
    .session.idle .session-status { color: #2a2a2a; }

    .session-time {
      font-size: 10px;
      color: #2a2a2a;
    }

    .session.stale-2 .session-time,
    .session.stale-3 .session-time {
      color: var(--red-dim);
    }

    .session-tty {
      font-size: 10px;
      color: #222;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--green-faint);
    }

    .empty .big {
      font-size: 14px;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--green-faint);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 3px;
    }

    /* Notification flash for newly-waiting sessions */
    @keyframes attentionFlash {
      0% { background: var(--amber-faint); }
      100% { background: var(--bg-card); }
    }

    .session.just-became-waiting {
      animation: attentionFlash 2s ease-out;
    }

    /* Managed badge */
    .managed-badge {
      font-size: 9px;
      color: var(--green-dim);
      border: 1px solid var(--green-faint);
      padding: 0 4px;
      letter-spacing: 1px;
    }

    /* Launch bar */
    .launch-bar {
      margin-bottom: 14px;
      display: flex;
      gap: 6px;
    }

    .launch-btn {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 11px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .launch-btn:hover {
      background: var(--green-faint);
      color: var(--green);
    }

    /* Launch modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border: 1px solid #222;
      padding: 20px;
      width: 500px;
      max-width: 90vw;
    }

    .modal h2 {
      font-size: 13px;
      font-weight: normal;
      color: var(--green-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .modal label {
      display: block;
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      margin-top: 10px;
    }

    .modal input, .modal select {
      width: 100%;
      background: #080808;
      border: 1px solid #1a1a1a;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }

    .modal input:focus { border-color: var(--green-faint); }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    .modal-cancel {
      background: none;
      border: 1px solid #222;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      padding: 6px 14px;
      cursor: pointer;
    }

    .modal-submit {
      background: none;
      border: 1px solid var(--green-faint);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 11px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .modal-submit:hover { background: var(--green-faint); color: var(--green); }
    .modal-error { color: var(--red-dim); font-size: 10px; margin-top: 8px; }

    .resumable-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
    }

    .resumable-item {
      padding: 6px 8px;
      background: var(--bg-card);
      margin-bottom: 1px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .resumable-item:hover { background: var(--bg-card-hover); }
    .resumable-name { color: var(--text-bright); font-size: 12px; }
    .resumable-slug { color: #2a2a2a; font-size: 10px; }
    .resumable-time { color: #2a2a2a; font-size: 10px; }

    /* Rescue command */
    .rescue-cmd {
      font-size: 10px;
      color: #2a2a2a;
      background: #080808;
      padding: 2px 6px;
      cursor: pointer;
      display: inline-block;
      margin-top: 1px;
      transition: color 0.15s;
    }

    .rescue-cmd:hover { color: var(--text); }
    .rescue-cmd.copied { color: var(--green-dim); }
  </style>
</head>
<body>
  <div class="screen">
    <div class="header">
      <div class="header-left">
        <h1>ccboard</h1>
        <span class="version">v0.1</span>
      </div>
      <div class="meta">
        <span class="live-dot"></span>
        <span id="session-count">0</span> sessions
      </div>
    </div>
    <div class="launch-bar">
      <button class="launch-btn" id="btn-new">+ NEW SESSION</button>
      <button class="launch-btn" id="btn-resume">RESUME SESSION</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="sessions" id="sessions">
      <div class="empty">
        <div class="big">CONNECTING</div>
        scanning for sessions<span class="cursor"></span>
      </div>
    </div>
  </div>

  <!-- New session modal -->
  <div class="modal-overlay" id="modal-new">
    <div class="modal">
      <h2>New Session</h2>
      <label>Working directory</label>
      <input type="text" id="new-cwd" placeholder="/Users/you/project" />
      <label>Session name (optional)</label>
      <input type="text" id="new-name" placeholder="my-feature" />
      <div class="modal-error" id="new-error"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="new-cancel">CANCEL</button>
        <button class="modal-submit" id="new-submit">LAUNCH</button>
      </div>
    </div>
  </div>

  <!-- Resume session modal -->
  <div class="modal-overlay" id="modal-resume">
    <div class="modal">
      <h2>Resume Session</h2>
      <div class="resumable-list" id="resumable-list">loading...</div>
      <div class="modal-error" id="resume-error"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="resume-cancel">CANCEL</button>
      </div>
    </div>
  </div>
  <script>
    const STATUS_ICONS = {
      waiting: '▶',
      working: '◉',
      idle: '○',
    };

    const STATUS_LABELS = {
      waiting: 'AWAITING INPUT',
      working: 'WORKING',
      idle: 'IDLE',
    };

    // Track previous states for transition detection
    let prevStates = new Map();
    let notificationsEnabled = false;

    // Request notification permission on first interaction
    document.addEventListener('click', () => {
      if (!notificationsEnabled && 'Notification' in window) {
        Notification.requestPermission().then(p => {
          notificationsEnabled = p === 'granted';
        });
      }
    }, { once: true });

    function timeAgo(ms) {
      const diff = Date.now() - ms;
      const sec = Math.floor(diff / 1000);
      if (sec < 30) return 'just now';
      if (sec < 60) return `${sec}s ago`;
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}m ago`;
      const hr = Math.floor(min / 60);
      return `${hr}h ago`;
    }

    function staleLevel(lastActivity, status) {
      if (status !== 'waiting') return 0;
      const idleMin = (Date.now() - lastActivity) / 60000;
      if (idleMin > 15) return 3;
      if (idleMin > 10) return 2;
      if (idleMin > 5) return 1;
      return 0;
    }

    function shortenPath(cwd) {
      return cwd.replace(/^\/Users\/[^/]+/, '~');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderSessions(sessions) {
      const container = document.getElementById('sessions');
      const countEl = document.getElementById('session-count');
      const summaryEl = document.getElementById('summary');

      countEl.textContent = sessions.length;

      if (sessions.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="big">NO ACTIVE SESSIONS</div>
            monitoring<span class="cursor"></span>
          </div>`;
        summaryEl.innerHTML = '';
        return;
      }

      // Summary
      const waiting = sessions.filter(s => s.status === 'waiting').length;
      const working = sessions.filter(s => s.status === 'working').length;
      const idle = sessions.filter(s => s.status === 'idle').length;

      const parts = [];
      if (waiting) parts.push(`<span class="s-waiting">${waiting} awaiting</span>`);
      if (working) parts.push(`<span class="s-working">${working} working</span>`);
      if (idle) parts.push(`<span class="s-idle">${idle} idle</span>`);
      summaryEl.innerHTML = parts.join('<span class="sep">·</span>');

      // Detect transitions for notifications
      const newStates = new Map();
      const justBecameWaiting = new Set();

      for (const s of sessions) {
        newStates.set(s.pid, s.status);
        const prev = prevStates.get(s.pid);
        if (prev && prev !== 'waiting' && s.status === 'waiting') {
          justBecameWaiting.add(s.pid);
          if (notificationsEnabled) {
            new Notification(`ccboard: ${s.shortName}`, {
              body: s.snippet || 'Awaiting your input',
              tag: `ccboard-${s.pid}`,
            });
          }
        }
      }
      prevStates = newStates;

      // Render
      container.innerHTML = sessions.map(s => {
        const ago = timeAgo(s.lastActivity);
        const stale = staleLevel(s.lastActivity, s.status);
        const staleClass = stale > 0 ? ` stale-${stale}` : '';
        const flashClass = justBecameWaiting.has(s.pid) ? ' just-became-waiting' : '';

        let snippetHtml = '';
        if (s.snippet) {
          snippetHtml = `<div class="session-snippet">${escapeHtml(s.snippet)}</div>`;
        } else if (s.lastUserMessage) {
          snippetHtml = `<div class="session-snippet"><span class="label">you: </span>${escapeHtml(s.lastUserMessage)}</div>`;
        }

        return `
          <a href="/session/${s.pid}" class="session ${s.status}${staleClass}${flashClass}">
            <div class="status-icon">${STATUS_ICONS[s.status]}</div>
            <div class="session-info">
              <div class="session-top">
                <span class="session-name">${escapeHtml(s.shortName)}</span>
                ${s.slug ? `<span class="session-slug">${escapeHtml(s.slug)}</span>` : ''}
              </div>
              <div class="session-path">${escapeHtml(shortenPath(s.cwd))}</div>
              ${snippetHtml}
              ${s.managed ? `<div class="rescue-cmd" onclick="event.preventDefault();navigator.clipboard.writeText('tmux attach -t ${escapeHtml(s.tmuxSession)}');this.textContent='copied!';this.classList.add('copied');setTimeout(()=>{this.textContent='tmux attach -t ${escapeHtml(s.tmuxSession)}';this.classList.remove('copied')},1500)">tmux attach -t ${escapeHtml(s.tmuxSession)}</div>` : ''}
            </div>
            <div class="session-meta">
              <div class="session-status">${STATUS_LABELS[s.status]}</div>
              <div class="session-time">${ago}</div>
              <div class="session-tty">${s.managed ? '<span class="managed-badge">CCB</span> ' : ''}${s.tty}</div>
            </div>
          </a>`;
      }).join('');

      // Update page title with attention count
      if (waiting > 0) {
        document.title = `(${waiting}) ccboard`;
      } else {
        document.title = 'ccboard';
      }
    }

    async function poll() {
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        renderSessions(sessions);
      } catch {
        // silent retry
      }
    }

    poll();
    setInterval(poll, 3000);

    // --- Launch / Resume modals ---

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
    });

    // New session
    document.getElementById('btn-new').addEventListener('click', () => openModal('modal-new'));
    document.getElementById('new-cancel').addEventListener('click', () => closeModal('modal-new'));
    document.getElementById('new-submit').addEventListener('click', async () => {
      const cwd = document.getElementById('new-cwd').value.trim();
      const name = document.getElementById('new-name').value.trim();
      const errEl = document.getElementById('new-error');
      if (!cwd) { errEl.textContent = 'working directory required'; return; }
      errEl.textContent = 'launching...';
      try {
        const res = await fetch('/api/launch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cwd, name: name || undefined }),
        });
        const data = await res.json();
        if (data.ok) {
          closeModal('modal-new');
          document.getElementById('new-cwd').value = '';
          document.getElementById('new-name').value = '';
          errEl.textContent = '';
          poll();
        } else {
          errEl.textContent = data.error;
        }
      } catch (err) { errEl.textContent = err.message; }
    });

    // Resume session
    document.getElementById('btn-resume').addEventListener('click', async () => {
      openModal('modal-resume');
      const list = document.getElementById('resumable-list');
      list.innerHTML = 'loading...';
      try {
        const res = await fetch('/api/resumable');
        const sessions = await res.json();
        if (sessions.length === 0) {
          list.innerHTML = '<div style="color:#333;padding:20px;text-align:center">no recent sessions found</div>';
          return;
        }
        list.innerHTML = sessions.map(s => {
          const ago = timeAgo(s.lastModified);
          return `
            <div class="resumable-item" data-cwd="${escapeHtml(s.cwd)}" data-sid="${escapeHtml(s.sessionId)}">
              <div>
                <span class="resumable-name">${escapeHtml(s.shortName)}</span>
                <span class="resumable-slug">${escapeHtml(s.slug || '')}</span>
              </div>
              <span class="resumable-time">${ago}</span>
            </div>`;
        }).join('');

        // Click to resume
        list.querySelectorAll('.resumable-item').forEach(item => {
          item.addEventListener('click', async () => {
            const cwd = item.dataset.cwd;
            const sessionId = item.dataset.sid;
            const errEl = document.getElementById('resume-error');
            errEl.textContent = 'resuming...';
            try {
              const res = await fetch('/api/launch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cwd, resume: true, sessionId }),
              });
              const data = await res.json();
              if (data.ok) {
                closeModal('modal-resume');
                errEl.textContent = '';
                poll();
              } else {
                errEl.textContent = data.error;
              }
            } catch (err) { errEl.textContent = err.message; }
          });
        });
      } catch (err) {
        list.innerHTML = `<div style="color:var(--red-dim)">${err.message}</div>`;
      }
    });
    document.getElementById('resume-cancel').addEventListener('click', () => closeModal('modal-resume'));
  </script>
  <script src="/ccboard-shell.js"></script>
</body>
</html>
